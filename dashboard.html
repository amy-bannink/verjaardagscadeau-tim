<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onze Herinneringen – Dashboard</title>
  <style>
    :root {
      --primary:       #F5C518;
      --primary-light: #FFF8D6;
      --primary-dark:  #C9A000;
      --bg:            #F7F7F5;
      --surface:       #FFFFFF;
      --border:        #E8E8E5;
      --text:          #1A1A1A;
      --text-muted:    #6B6B6B;
      --half-h:        230px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      background: none; border: 1.5px solid var(--border);
      border-radius: 50px; padding: 6px 14px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; color: var(--text);
      font-family: inherit; transition: background 0.15s;
    }
    .back-btn:hover { background: var(--primary-light); border-color: var(--primary); }
    .topbar-title { font-size: 1rem; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-badge {
      background: var(--primary-light); border: 1.5px solid var(--primary);
      border-radius: 50px; padding: 6px 14px;
      font-size: 0.85rem; font-weight: 600;
    }
    .logout-btn {
      background: none; border: 1.5px solid var(--border);
      border-radius: 50px; padding: 6px 14px;
      font-size: 0.85rem; cursor: pointer;
      color: var(--text-muted); font-family: inherit;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: #fee; color: #cc2222; border-color: #cc2222; }

    /* ── Page ── */
    .page-content { max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; }
    .page-header h1 span {
      background: var(--primary-light); color: var(--primary-dark);
      padding: 0 8px; border-radius: 6px;
    }
    .page-header p { margin-top: 8px; color: var(--text-muted); font-size: 0.95rem; }

    /* ── Add button ── */
    .add-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; background: var(--primary);
      border: none; border-radius: 50px;
      font-size: 0.92rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 40px;
    }
    .add-btn:hover { background: var(--primary-dark); transform: scale(1.02); }

    /* ── Timeline section heading ── */
    .timeline-section h2 {
      font-size: 1.1rem; font-weight: 600;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 10px;
    }
    .timeline-section h2::before {
      content: ''; display: inline-block;
      width: 4px; height: 1.1rem;
      background: var(--primary); border-radius: 2px;
    }

    /* ══════════════════════════════════
       DESKTOP TIMELINE (horizontal)
    ══════════════════════════════════ */
    .timeline-scroll { overflow-x: auto; padding-bottom: 20px; }

    .timeline-track {
      display: flex;
      align-items: stretch;
      position: relative;
      min-width: max-content;
      padding: 0 60px;
    }

    /* Horizontal line at dot level */
    .timeline-track::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: calc(var(--half-h) + 9px);
      height: 3px;
      background: var(--border);
      border-radius: 2px;
    }

    /* Each item is a vertical column */
    .memory-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 210px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .memory-item:hover .timeline-dot { transform: scale(1.3); box-shadow: 0 0 0 4px rgba(245,197,24,0.35); }

    /* Top half */
    .item-top {
      height: var(--half-h);
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14px;
    }

    /* Dot row */
    .item-dot-row {
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    /* Bottom half */
    .item-bottom {
      height: var(--half-h);
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 14px;
    }

    /* Dot */
    .timeline-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--surface);
      box-shadow: 0 0 0 2px var(--primary);
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    /* Label */
    .memory-label { text-align: center; padding: 0 8px; }
    .memory-label-date { font-size: 0.74rem; color: var(--text-muted); margin-bottom: 3px; }
    .memory-label-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .memory-label-loc  { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Fan wrap (cards fan UP from bottom pivot) ── */
    .fan-wrap {
      position: relative;
      width: 190px;
      height: 210px;
    }
    .fan-card {
      position: absolute;
      bottom: 0; left: 50%;
      transform-origin: bottom center;
      width: 118px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 5px 18px rgba(0,0,0,0.15);
      transition: transform 0.28s ease, box-shadow 0.2s;
      background: white;
    }
    .fan-card img { width: 100%; display: block; }
    .fan-card:nth-child(1) { transform: translateX(-50%) rotate(-14deg); z-index: 1; }
    .fan-card:nth-child(2) { transform: translateX(-50%) rotate(10deg);  z-index: 2; }
    .fan-wrap:hover .fan-card:nth-child(1) { transform: translateX(-70%) rotate(-22deg); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
    .fan-wrap:hover .fan-card:nth-child(2) { transform: translateX(-30%) rotate(18deg);  box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

    /* ── Fan wrap FLIPPED (cards hang DOWN from top pivot) ── */
    .fan-wrap.flipped .fan-card {
      bottom: auto; top: 0;
      transform-origin: top center;
    }
    .fan-wrap.flipped .fan-card:nth-child(1) { transform: translateX(-50%) rotate(14deg); }
    .fan-wrap.flipped .fan-card:nth-child(2) { transform: translateX(-50%) rotate(-10deg); }
    .fan-wrap.flipped:hover .fan-card:nth-child(1) { transform: translateX(-70%) rotate(22deg);  box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
    .fan-wrap.flipped:hover .fan-card:nth-child(2) { transform: translateX(-30%) rotate(-18deg); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

    /* ── Future dots ── */
    .timeline-future {
      display: flex;
      align-items: center;
      padding-left: 16px;
      height: calc(var(--half-h) * 2 + 18px);
    }
    .future-dots-inner {
      display: flex;
      gap: 10px;
      margin-top: calc(var(--half-h) + 9px - 5px);
    }
    .future-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ccc;
      opacity: 0.55;
    }

    /* ══════════════════════════════════
       MOBILE TIMELINE (vertical)
    ══════════════════════════════════ */
    @media (max-width: 767px) {
      .timeline-scroll { overflow-x: visible; padding-bottom: 0; }

      .timeline-track {
        flex-direction: column;
        min-width: auto;
        padding: 0;
        position: relative;
      }
      /* Vertical line */
      .timeline-track::before {
        left: 9px; right: auto;
        top: 0; bottom: 0;
        width: 3px; height: auto;
      }

      .memory-item {
        flex-direction: row;
        align-items: flex-start;
        width: 100%;
        height: auto;
        padding: 0 0 32px 40px;
        position: relative;
      }

      /* Hide desktop top/bottom halves */
      .item-top, .item-bottom { display: none !important; }

      /* Dot aligned to vertical line */
      .item-dot-row {
        position: absolute;
        left: 0; top: 3px;
        width: 18px; height: 18px;
      }

      /* Mobile content block */
      .item-mobile-content { display: block; }
      .mobile-label-name { font-size: 1rem; font-weight: 700; }
      .mobile-label-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }
      .mobile-fan {
        display: flex; gap: 10px;
        margin-top: 12px; flex-wrap: wrap;
      }
      .mobile-thumb {
        width: 90px; border-radius: 8px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.12);
        cursor: pointer;
      }

      .timeline-future { display: none; }
    }

    /* ══════════════════════════════════
       DETAIL MODAL
    ══════════════════════════════════ */
    #detailModal {
      display: none;
      position: fixed; inset: 0;
      z-index: 3000;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #detailModal.open { display: flex; }

    .detail-box {
      background: var(--surface);
      border-radius: 20px;
      max-width: 820px; width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
      animation: slideUp 0.3s ease;
      /* Scrollbar styling */
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    /* WebKit scrollbar: no arrows, rounded track margins */
    .detail-box::-webkit-scrollbar { width: 6px; }
    .detail-box::-webkit-scrollbar-track {
      background: transparent;
      margin: 20px 0; /* keeps thumb away from rounded corners */
    }
    .detail-box::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .detail-box::-webkit-scrollbar-button { display: none !important; height: 0 !important; width: 0 !important; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-header { display: none; }
    .detail-close {
      position: absolute; top: 14px; right: 14px;
      background: var(--bg); border: none;
      border-radius: 50%; width: 34px; height: 34px;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: background 0.15s;
      z-index: 10;
    }
    .detail-close:hover { background: var(--border); }

    .detail-meta {
      padding: 20px 24px 0 24px;
    }
    .detail-title {
      font-size: 1.5rem; font-weight: 700;
      line-height: 1.2;
    }
    .detail-date-loc {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-top: 10px;
    }
    .detail-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 50px; padding: 4px 12px;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .detail-desc {
      padding: 14px 24px 0;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    /* ── Photo viewer (large, in modal) ── */
    .detail-viewer {
      position: relative;
      margin: 20px 0 0;
      background: var(--surface);
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #viewerImg {
      max-width: 88%; max-height: 88%;
      object-fit: contain;
      user-select: none;
      transition: opacity 0.18s ease;
      display: block;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.10);
    }
    #viewerImg.fading { opacity: 0; }
    .viewer-counter {
      position: absolute;
      bottom: 10px; right: 14px;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.85);
      font-size: 0.78rem;
      padding: 3px 9px; border-radius: 20px;
    }
    .viewer-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: none; padding: 8px;
      font-size: 2rem; color: var(--primary);
      cursor: pointer; z-index: 2;
      line-height: 1;
      text-shadow: 0 1px 6px rgba(0,0,0,0.18);
      transition: opacity 0.15s, transform 0.15s;
    }
    .viewer-arrow:hover  { opacity: 0.75; transform: translateY(-50%) scale(1.12); }
    .viewer-arrow:disabled { opacity: 0.15; cursor: default; transform: translateY(-50%) scale(1); }
    .viewer-arrow.prev { left: 4px; }
    .viewer-arrow.next { right: 4px; }

    /* ── Thumbnail strip ── */
    .detail-thumbs-wrap {
      overflow-x: auto;
      padding: 12px 24px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .detail-thumbs {
      display: flex;
      gap: 10px;
      width: max-content;
    }
    .detail-thumb {
      flex-shrink: 0;
      width: 88px; height: 66px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.55;
      border: 2.5px solid transparent;
      transition: opacity 0.15s, border-color 0.15s;
      background: var(--primary-light);
    }
    .detail-thumb:hover  { opacity: 0.82; }
    .detail-thumb.active { opacity: 1; border-color: var(--primary); }
    .detail-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── All photos grid ── */
    .detail-all-heading {
      padding: 4px 24px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .detail-all-grid {
      columns: 3;
      column-gap: 12px;
      padding: 0 24px 28px;
    }
    .detail-all-photo {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transition: transform 0.15s, box-shadow 0.15s;
      outline: 2.5px solid transparent;
    }
    .detail-all-photo:hover { transform: scale(1.03); box-shadow: 0 6px 22px rgba(0,0,0,0.16); }
    .detail-all-photo.active { outline-color: var(--primary); }
    .detail-all-photo img { width: 100%; display: block; }

    @media (max-width: 767px) {
      #detailModal { padding: 0; align-items: flex-end; }
      .detail-box {
        border-radius: 20px 20px 0 0;
        max-height: 90vh;
        max-width: 100%;
        width: 100%;
        animation: slideUpMobile 0.3s ease;
      }
      @keyframes slideUpMobile {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      .detail-viewer { height: 240px; }
      .detail-all-grid { columns: 2; }
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: var(--text); color: white;
      padding: 12px 24px; border-radius: 50px;
      font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="window.location.href='./index.html'">← Terug</button>
      <span class="topbar-title">📸 Onze Herinneringen</span>
    </div>
    <div class="topbar-right">
      <span class="user-badge" id="userBadge">👤 ...</span>
      <button class="logout-btn" onclick="doLogout()">Uitloggen</button>
    </div>
  </div>

  <div class="page-content">
    <div class="page-header">
      <h1>Hallo, <span id="welcomeName">...</span> 👋</h1>
      <p>Hier staan jullie gedeelde herinneringen. Klik op een herinnering om hem te bekijken.</p>
    </div>

    <button class="add-btn" onclick="showComingSoon()">+ Herinnering toevoegen</button>

    <div class="timeline-section">
      <h2>Tijdlijn</h2>
      <div class="timeline-scroll">
        <div class="timeline-track" id="timelineTrack"></div>
      </div>
    </div>
  </div>

  <!-- Detail modal -->
  <div id="detailModal">
    <div class="detail-box">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-meta">
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-date-loc">
          <span class="detail-chip" id="detailDate"></span>
          <span class="detail-chip" id="detailLocation"></span>
        </div>
      </div>
      <div class="detail-desc" id="detailDesc"></div>

      <!-- Large viewer -->
      <div class="detail-viewer">
        <button class="viewer-arrow prev" id="viewerPrev" onclick="viewerStep(-1)">&#8592;</button>
        <img id="viewerImg" src="" alt="" />
        <button class="viewer-arrow next" id="viewerNext" onclick="viewerStep(1)">&#8594;</button>
        <div class="viewer-counter" id="viewerCounter"></div>
      </div>

      <!-- Thumbnail strip -->
      <div class="detail-thumbs-wrap">
        <div class="detail-thumbs" id="detailThumbs"></div>
      </div>

      <!-- All photos overview grid -->
      <div class="detail-all-heading">Alle foto's</div>
      <div class="detail-all-grid" id="detailAllPhotos"></div>
    </div>
  </div>

  <div id="toast">Coming soon! 🔨</div>

  <script>
    // ── Session guard ──
    const session = JSON.parse(localStorage.getItem('app_session') || 'null');
    if (!session || Date.now() - session.loginAt > 30 * 24 * 60 * 60 * 1000) {
      window.location.replace('./index.html');
    } else {
      document.getElementById('welcomeName').textContent = session.name;
      document.getElementById('userBadge').textContent   = '👤 ' + session.name;
    }

    function doLogout() {
      localStorage.removeItem('app_session');
      window.location.href = './index.html';
    }

    // ══════════════════════════════════════════
    // HERINNERINGEN DATA
    // Sorteer oudste eerst (= links op desktop)
    // ══════════════════════════════════════════
    const MEMORIES = [
      {
        id: 3,
        title: "Weekendje Gent",
        date: "7–8 februari 2026",
        sortDate: "2026-02-07",
        location: "Gent, België",
        description: "Een gezellig weekend door het historische centrum van Gent. Stroopwafels, kanalen en een heleboel gezelligheid.",
        images: ["images/bxl02.svg", "images/bxl01.svg"]
      },
      {
        id: 2,
        title: "Dagje Efteling",
        date: "14 maart 2026",
        sortDate: "2026-03-14",
        location: "Kaatsheuvel, Nederland",
        description: null,
        images: ["images/bxl01.svg", "images/bxl02.svg"]
      },
      {
        id: 1,
        title: "Brussel Weekend",
        date: "18–20 april 2026",
        sortDate: "2026-04-18",
        location: "Brussel, België",
        description: "Walibi voor de schreeuw-therapie, een knus Airbnb, en een heerlijk verjaardagsdiner. Niet slecht voor een weekend.",
        images: ["images/bxl01.svg", "images/bxl02.svg", "images/memory14.svg", "images/memory17.svg", "images/memory07.svg"]
      }
    ].sort((a, b) => a.sortDate.localeCompare(b.sortDate)); // oldest first

    // ══════════════════════════════════════════
    // TIMELINE RENDERER
    // ══════════════════════════════════════════
    function isMobile() { return window.innerWidth < 768; }

    function renderTimeline() {
      const track = document.getElementById('timelineTrack');
      track.innerHTML = '';

      const mobile  = isMobile();
      // Desktop: oldest → newest (left → right)
      // Mobile: newest → oldest (top → bottom)
      const ordered = mobile ? [...MEMORIES].slice().reverse() : [...MEMORIES];

      ordered.forEach(mem => {
        // Determine above/below based on original array index (not display order)
        const origIdx = MEMORIES.indexOf(mem);
        const isAbove = origIdx % 2 === 0; // 0,2,4 = above | 1,3,5 = below

        const item = document.createElement('div');
        item.className = `memory-item ${isAbove ? 'above' : 'below'}`;
        item.onclick   = () => openDetail(mem);

        if (!mobile) {
          // ── Desktop: three-zone column ──
          const fanClass = isAbove ? '' : 'flipped';
          const fanHtml  = buildFan(mem.images, fanClass);
          const lblHtml  = buildLabel(mem);

          item.innerHTML = `
            <div class="item-top">
              ${isAbove ? fanHtml : lblHtml}
            </div>
            <div class="item-dot-row">
              <div class="timeline-dot"></div>
            </div>
            <div class="item-bottom">
              ${isAbove ? lblHtml : fanHtml}
            </div>`;
        } else {
          // ── Mobile: dot + inline content ──
          item.style.position = 'relative';
          item.innerHTML = `
            <div class="item-dot-row">
              <div class="timeline-dot"></div>
            </div>
            <div class="item-mobile-content">
              <div class="mobile-label-name">${mem.title}</div>
              <div class="mobile-label-meta">🗓 ${mem.date} &nbsp;·&nbsp; 📍 ${mem.location}</div>
              <div class="mobile-fan">
                ${mem.images.map(src =>
                  `<img src="${src}" class="mobile-thumb" alt="" />`
                ).join('')}
              </div>
            </div>`;
        }

        track.appendChild(item);
      });

      // Future dots (desktop only)
      if (!mobile) {
        const fut = document.createElement('div');
        fut.className = 'timeline-future';
        fut.innerHTML = `<div class="future-dots-inner">
          <div class="future-dot"></div>
          <div class="future-dot"></div>
          <div class="future-dot"></div>
        </div>`;
        track.appendChild(fut);
      }
    }

    function buildFan(images, extraClass) {
      return `<div class="fan-wrap ${extraClass}">
        ${images.map(src => `<div class="fan-card"><img src="${src}" alt="" /></div>`).join('')}
      </div>`;
    }

    function buildLabel(mem) {
      return `<div class="memory-label">
        <div class="memory-label-date">${mem.date}</div>
        <div class="memory-label-name">${mem.title}</div>
        <div class="memory-label-loc">📍 ${mem.location}</div>
      </div>`;
    }

    // Re-render on resize (debounced)
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderTimeline, 150);
    });

    // Initial render
    renderTimeline();

    // ══════════════════════════════════════════
    // DETAIL MODAL + VIEWER
    // ══════════════════════════════════════════
    let viewerImages = [];
    let viewerIndex  = 0;

    function openDetail(mem) {
      viewerImages = mem.images;

      document.getElementById('detailTitle').textContent    = mem.title;
      document.getElementById('detailDate').textContent     = '🗓 ' + mem.date;
      document.getElementById('detailLocation').textContent = '📍 ' + mem.location;

      const descEl = document.getElementById('detailDesc');
      descEl.textContent   = mem.description || '';
      descEl.style.display = mem.description ? 'block' : 'none';

      // Build thumbnail strip
      document.getElementById('detailThumbs').innerHTML = mem.images.map((src, i) =>
        `<div class="detail-thumb" onclick="viewerGoTo(${i})">
           <img src="${src}" alt="" />
         </div>`
      ).join('');

      // Build all-photos grid
      document.getElementById('detailAllPhotos').innerHTML = mem.images.map((src, i) =>
        `<div class="detail-all-photo" onclick="viewerGoTo(${i}); this.closest('.detail-box').scrollTop = 0;">
           <img src="${src}" alt="" />
         </div>`
      ).join('');

      viewerShow(0, false);
      document.getElementById('detailModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function viewerShow(i, animate) {
      viewerIndex = i;
      const img = document.getElementById('viewerImg');

      if (animate) {
        img.classList.add('fading');
        setTimeout(() => { img.src = viewerImages[i]; img.classList.remove('fading'); }, 160);
      } else {
        img.src = viewerImages[i];
      }

      document.getElementById('viewerCounter').textContent = (i + 1) + ' / ' + viewerImages.length;
      document.getElementById('viewerPrev').disabled = (i === 0);
      document.getElementById('viewerNext').disabled = (i === viewerImages.length - 1);

      // Highlight active thumb + all-photos grid item
      document.querySelectorAll('.detail-thumb').forEach((t, ti) =>
        t.classList.toggle('active', ti === i)
      );
      document.querySelectorAll('.detail-all-photo').forEach((t, ti) =>
        t.classList.toggle('active', ti === i)
      );
      // Scroll active thumb into view
      const strip = document.getElementById('detailThumbs');
      if (strip.children[i])
        strip.children[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function viewerGoTo(i) { viewerShow(i, true); }
    function viewerStep(dir) {
      const n = viewerIndex + dir;
      if (n >= 0 && n < viewerImages.length) viewerShow(n, true);
    }

    function closeDetail() {
      document.getElementById('detailModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Keyboard: arrows + Escape inside modal
    document.addEventListener('keydown', e => {
      if (!document.getElementById('detailModal').classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  viewerStep(-1);
      if (e.key === 'ArrowRight') viewerStep(1);
      if (e.key === 'Escape')     closeDetail();
    });

    // Touch swipe on modal (mobile)
    let _tx = 0;
    document.getElementById('detailModal').addEventListener('touchstart', e => {
      _tx = e.touches[0].clientX;
    }, { passive: true });
    document.getElementById('detailModal').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - _tx;
      if (Math.abs(dx) > 48) viewerStep(dx < 0 ? 1 : -1);
    });

    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeDetail();
    });

    // ── Toast ──
    function showComingSoon() {
      const t = document.getElementById('toast');
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 2500);
    }
  </script>
</body>
</html>
