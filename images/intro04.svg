  <g transform="rotate(9, 118, 378)">
    <rect x="60" y="328" width="106" height="122" rx="5" fill="white"/>
    <rect x="60" y="328" width="106" height="122" rx="5" fill="none" stroke="#e8e0d0" stroke-width="1.5"/>
