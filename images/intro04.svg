    <text x="125" y="200" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#888">Brussel ☀️</text>
  </g>

  <!-- Polaroid 2 — top right, tilted right -->
  <g transform="rotate(16, 655, 118)">
