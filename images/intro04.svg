  <circle cx="45" cy="160" r="5" fill="#C9A000" opacity=".4"/>
  <circle cx="755" cy="210" r="5" fill="#C9A000" opacity=".4"/>
  <circle cx="105" cy="370" r="4" fill="#C9A000" opacity=".35"/>
  <circle cx="695" cy="365" r="4" fill="#C9A000" opacity=".35"/>
  <circle cx="200" cy="70" r="4.5" fill="#F5C518" opacity=".5"/>
