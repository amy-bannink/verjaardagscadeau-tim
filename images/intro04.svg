    <rect x="355" y="36" width="90" height="105" rx="5" fill="none" stroke="#e8e0d0" stroke-width="1.5" opacity=".7"/>
    <rect x="362" y="43" width="76" height="63" fill="#f5f5f5"/>
    <text x="400" y="82" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#ccc">?</text>
    <text x="400" y="124" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#bbb">nieuw...</text>
