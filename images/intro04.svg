  <circle cx="520" cy="210" r="8.5" fill="white"/>
  <circle cx="491" cy="210" r="5.5" fill="#1a1a1a"/>
  <circle cx="521" cy="210" r="5.5" fill="#1a1a1a"/>
  <circle cx="492" cy="209" r="2" fill="white"/>
  <circle cx="522" cy="209" r="2" fill="white"/>
  <!-- Eyebrows -->
  <path d="M483 199 Q491 195 499 198" fill="none" stroke="#2C1810" stroke-width="3"/>
  <path d="M511 198 Q519 195 527 199" fill="none" stroke="#2C1810" stroke-width="3"/>

  <!-- Amy speech bubble -->
  <rect x="524" y="148" width="130" height="50" rx="10" fill="white" opacity=".93"/>
  <path d="M546,198 L540,214 L560,200 Z" fill="white" opacity=".93"/>
  <text x="589" y="168" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e91e8c">Kijk hier! 📸</text>
  <text x="589" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">zeg kaasje!</text>

  <!-- Camera flash burst -->
  <circle cx="422" cy="301" r="30" fill="white" opacity=".06"/>
  <circle cx="422" cy="301" r="50" fill="white" opacity=".03"/>

  <!-- Floating stars / sparkles -->
  <text x="388" y="178" font-family="sans-serif" font-size="20" fill="#F5C518" opacity=".7">★</text>
  <text x="420" y="170" font-family="sans-serif" font-size="13" fill="#F5C518" opacity=".6">♥</text>
  <text x="448" y="180" font-family="sans-serif" font-size="18" fill="#F5C518" opacity=".55">★</text>
  <text x="370" y="190" font-family="sans-serif" font-size="10" fill="#C9A000" opacity=".5">✦</text>
  <text x="464" y="190" font-family="sans-serif" font-size="10" fill="#C9A000" opacity=".5">✦</text>
