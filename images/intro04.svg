<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8D6"/>
      <stop offset="55%" stop-color="#FDEEA0"/>
      <stop offset="100%" stop-color="#F5D862"/>
    </linearGradient>
  </defs>

  <!-- Warm yellow background -->
  <rect width="800" height="500" fill="url(#bg4)"/>

  <!-- Subtle bokeh circles -->
  <circle cx="80" cy="90" r="55" fill="#F5C518" opacity=".10"/>
  <circle cx="720" cy="110" r="65" fill="#F5C518" opacity=".09"/>
  <circle cx="140" cy="430" r="42" fill="#F5C518" opacity=".10"/>
  <circle cx="660" cy="440" r="48" fill="#F5C518" opacity=".09"/>
  <circle cx="400" cy="55" r="35" fill="white" opacity=".18"/>
  <circle cx="500" cy="460" r="30" fill="white" opacity=".14"/>

