  <path d="M478 250 Q470 268 472 295 Q480 292 479 278 Q479 263 480 253 Z" fill="#2C1810"/>
  <path d="M532 250 Q540 268 538 295 Q530 292 531 278 Q531 263 530 253 Z" fill="#2C1810"/>
