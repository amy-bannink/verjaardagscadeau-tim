  <path d="M600 160 Q680 140 750 170" fill="none" stroke="#5c3a1e" stroke-width="8" stroke-linecap="round"/>
  <circle cx="612" cy="152" r="9" fill="#e05a2a"/>
  <path d="M605 154 L600 162 L610 160 Z" fill="#e09040"/>
  <circle cx="609" cy="150" r="2.5" fill="#1a1a1a"/>

  <text x="400" y="485" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#c8f0a0" opacity=".9">Dag 3: de bessen waren verdacht 🌿</text>
