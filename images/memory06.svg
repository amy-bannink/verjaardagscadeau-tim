  <circle cx="527" cy="240" r="5" fill="white" opacity=".85"/>
  <circle cx="521" cy="247" r="3" fill="white" opacity=".85"/>
  <text x="540" y="234" text-anchor="middle" font-family="sans-serif" font-size="18">☠️</text>

