  <!-- Nemes headdress -->
  <path d="M574 268 Q574 248 603 245 Q632 248 632 268 L635 295 Q625 300 603 302 Q581 300 571 295 Z" fill="#c9a000"/>
  <!-- Headdress stripes blue -->
  <line x1="576" y1="258" x2="575" y2="292" stroke="#1a5a8a" stroke-width="2.5" opacity=".7"/>
  <line x1="583" y1="254" x2="581" y2="298" stroke="#1a5a8a" stroke-width="2.5" opacity=".7"/>
  <line x1="623" y1="254" x2="625" y2="298" stroke="#1a5a8a" stroke-width="2.5" opacity=".7"/>
  <line x1="630" y1="258" x2="631" y2="292" stroke="#1a5a8a" stroke-width="2.5" opacity=".7"/>
  <!-- Uraeus -->
  <path d="M595 248 Q601 238 607 248" fill="none" stroke="#F5C518" stroke-width="3"/>
  <circle cx="601" cy="237" r="5" fill="#F5C518"/>
  <!-- Kohl eyes -->
  <path d="M588 275 L600 274 L592 278 Z" fill="#1a1a1a"/>
  <circle cx="593" cy="275" r="4" fill="#1a1a1a"/>
  <circle cx="594" cy="274" r="1.5" fill="white"/>
  <path d="M606 275 L618 274 L612 278 Z" fill="#1a1a1a"/>
  <circle cx="613" cy="275" r="4" fill="#1a1a1a"/>
  <circle cx="614" cy="274" r="1.5" fill="white"/>
  <!-- Regal smile -->
  <path d="M592 290 Q602 297 613 292" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dark hair visible at sides -->
  <path d="M575 270 Q568 285 570 305" fill="none" stroke="#2C1810" stroke-width="7" stroke-linecap="round"/>
  <path d="M631 270 Q638 285 636 305" fill="none" stroke="#2C1810" stroke-width="7" stroke-linecap="round"/>
  <!-- Scepter -->
  <line x1="667" y1="295" x2="653" y2="360" stroke="#c9a000" stroke-width="5" stroke-linecap="round"/>
  <path d="M660 294 Q670 282 677 292 Q672 300 663 296 Z" fill="#c9a000"/>

  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#c8922a" opacity=".9">Als farao's in het oude Egypte 🏺</text>
</svg>
