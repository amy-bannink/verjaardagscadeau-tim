  <text x="752" y="258" font-family="sans-serif" font-size="16" fill="#c8922a" opacity=".5">𓇯</text>
  <text x="752" y="284" font-family="sans-serif" font-size="18" fill="#c8922a" opacity=".6">𓁿</text>

