  <text x="28" y="230" font-family="sans-serif" font-size="18" fill="#c8922a" opacity=".6">𓁹</text>
  <text x="28" y="258" font-family="sans-serif" font-size="16" fill="#c8922a" opacity=".5">𓃀</text>
  <text x="28" y="284" font-family="sans-serif" font-size="18" fill="#c8922a" opacity=".6">𓆣</text>
