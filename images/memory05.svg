<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="tomb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8922a"/>
      <stop offset="100%" stop-color="#7a4e10"/>
    </linearGradient>
    <linearGradient id="wall5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="40%" stop-color="#3d2810"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#wall5)"/>

  <!-- Stone wall texture -->
  <rect x="0" y="0" width="800" height="500" fill="none" stroke="#2a1808" stroke-width="30"/>
  <!-- Wall blocks -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#251508" stroke-width="3" opacity=".5"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#251508" stroke-width="3" opacity=".5"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#251508" stroke-width="3" opacity=".3"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#251508" stroke-width="3" opacity=".3"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#251508" stroke-width="3" opacity=".3"/>
  <!-- Vertical block lines -->
  <line x1="100" y1="0" x2="100" y2="80" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="260" y1="0" x2="260" y2="80" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="420" y1="0" x2="420" y2="80" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="580" y1="0" x2="580" y2="80" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="180" y1="80" x2="180" y2="160" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="340" y1="80" x2="340" y2="160" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="500" y1="80" x2="500" y2="160" stroke="#251508" stroke-width="2" opacity=".4"/>
  <line x1="660" y1="80" x2="660" y2="160" stroke="#251508" stroke-width="2" opacity=".4"/>

  <!-- Torches on walls -->
  <rect x="55" y="100" width="10" height="25" rx="3" fill="#8B5E2A"/>
  <ellipse cx="60" cy="98" rx="8" ry="12" fill="#ff8c00" opacity=".9"/>
  <ellipse cx="60" cy="93" rx="5" ry="8" fill="#ffdd00" opacity=".8"/>
  <circle cx="60" cy="88" r="4" fill="white" opacity=".6"/>
  <!-- torch glow -->
  <ellipse cx="60" cy="100" rx="40" ry="30" fill="#ff8c00" opacity=".08"/>

  <rect x="735" y="100" width="10" height="25" rx="3" fill="#8B5E2A"/>
  <ellipse cx="740" cy="98" rx="8" ry="12" fill="#ff8c00" opacity=".9"/>
  <ellipse cx="740" cy="93" rx="5" ry="8" fill="#ffdd00" opacity=".8"/>
  <circle cx="740" cy="88" r="4" fill="white" opacity=".6"/>
  <ellipse cx="740" cy="100" rx="40" ry="30" fill="#ff8c00" opacity=".08"/>

  <!-- Hieroglyphs left wall -->
