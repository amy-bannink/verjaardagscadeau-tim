  <circle cx="175" cy="304" r="4" fill="#e05a7a"/>
  <circle cx="185" cy="300" r="4" fill="#F5C518"/>
  <circle cx="194" cy="298" r="4" fill="#e05a7a"/>
  <circle cx="203" cy="300" r="4" fill="#F5C518"/>
  <circle cx="213" cy="304" r="4" fill="#e05a7a"/>
  <circle cx="223" cy="310" r="4" fill="#F5C518"/>
