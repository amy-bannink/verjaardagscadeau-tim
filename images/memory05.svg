  <line x1="165" y1="258" x2="164" y2="292" stroke="#F5C518" stroke-width="2.5" opacity=".7"/>
  <line x1="172" y1="254" x2="170" y2="298" stroke="#F5C518" stroke-width="2.5" opacity=".7"/>
  <line x1="216" y1="254" x2="218" y2="298" stroke="#F5C518" stroke-width="2.5" opacity=".7"/>
  <line x1="223" y1="258" x2="224" y2="292" stroke="#F5C518" stroke-width="2.5" opacity=".7"/>
  <!-- Uraeus snake on forehead -->
  <path d="M186 248 Q192 238 198 248" fill="none" stroke="#c9a000" stroke-width="3"/>
  <circle cx="192" cy="237" r="5" fill="#c9a000"/>
  <!-- Kohl eyes -->
  <path d="M178 275 L190 274 L182 278 Z" fill="#1a1a1a"/>
  <circle cx="183" cy="275" r="4" fill="#1a1a1a"/>
  <circle cx="184" cy="274" r="1.5" fill="white"/>
  <path d="M200 275 L212 274 L206 278 Z" fill="#1a1a1a"/>
  <circle cx="205" cy="275" r="4" fill="#1a1a1a"/>
  <circle cx="206" cy="274" r="1.5" fill="white"/>
