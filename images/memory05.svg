  <!-- Kilt -->
  <path d="M582,355 L625,355 L630,430 L577,430 Z" fill="#e05a7a"/>
  <!-- Collar -->
  <ellipse cx="603" cy="310" rx="35" ry="15" fill="#c9a000"/>
  <circle cx="575" cy="310" r="4" fill="#e05a7a"/>
  <circle cx="585" cy="304" r="4" fill="#1a5a8a"/>
  <circle cx="595" cy="300" r="4" fill="#e05a7a"/>
  <circle cx="603" cy="298" r="4" fill="#1a5a8a"/>
  <circle cx="611" cy="300" r="4" fill="#e05a7a"/>
  <circle cx="621" cy="304" r="4" fill="#1a5a8a"/>
  <circle cx="631" cy="310" r="4" fill="#e05a7a"/>
  <!-- Body -->
  <rect x="578" y="310" width="50" height="48" rx="5" fill="#F5C5A3"/>
  <!-- Arms on armrests -->
  <rect x="538" y="320" width="42" height="16" rx="6" fill="#F5C5A3"/>
  <rect x="628" y="320" width="42" height="16" rx="6" fill="#F5C5A3"/>
  <!-- Head -->
