<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#3d1508"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="62%" r="45%">
      <stop offset="0%" stop-color="#ff9800" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark restaurant background -->
  <rect width="300" height="400" fill="url(#bg2)"/>

  <!-- Warm candlelight glow -->
  <ellipse cx="150" cy="248" rx="155" ry="130" fill="url(#glow2)"/>

  <!-- Back wall paneling -->
  <rect x="0" y="0" width="300" height="160" fill="#280e02" opacity=".6"/>
  <!-- Subtle wall panel lines -->
  <line x1="0" y1="40" x2="300" y2="40" stroke="#3d1508" stroke-width="1.5" opacity=".5"/>
  <line x1="0" y1="80" x2="300" y2="80" stroke="#3d1508" stroke-width="1.5" opacity=".5"/>
  <line x1="0" y1="120" x2="300" y2="120" stroke="#3d1508" stroke-width="1.5" opacity=".5"/>
  <line x1="75" y1="0" x2="75" y2="160" stroke="#3d1508" stroke-width="1" opacity=".4"/>
  <line x1="150" y1="0" x2="150" y2="160" stroke="#3d1508" stroke-width="1" opacity=".4"/>
  <line x1="225" y1="0" x2="225" y2="160" stroke="#3d1508" stroke-width="1" opacity=".4"/>

  <!-- Wall sconces (ambient light) -->
  <ellipse cx="50" cy="55" rx="14" ry="10" fill="#ff9800" opacity=".18"/>
  <rect x="46" y="42" width="8" height="16" rx="2" fill="#8B6020" opacity=".7"/>
  <ellipse cx="250" cy="55" rx="14" ry="10" fill="#ff9800" opacity=".18"/>
  <rect x="246" y="42" width="8" height="16" rx="2" fill="#8B6020" opacity=".7"/>

  <!-- Table (white tablecloth, oval) -->
  <ellipse cx="150" cy="308" rx="125" ry="48" fill="white" opacity=".96"/>
  <ellipse cx="150" cy="308" rx="116" ry="41" fill="#faf7f2"/>
  <!-- Tablecloth inner oval -->
  <ellipse cx="150" cy="306" rx="90" ry="32" fill="none" stroke="#e8e0d5" stroke-width="1.5" opacity=".6"/>
  <!-- Table shadow -->
  <ellipse cx="150" cy="357" rx="108" ry="22" fill="black" opacity=".28"/>
  <!-- Table leg (center) -->
  <rect x="141" y="348" width="18" height="52" rx="6" fill="#4a1e00"/>

  <!-- Candle centerpiece -->
  <ellipse cx="150" cy="286" rx="16" ry="5.5" fill="#C9A000" opacity=".9"/>
  <!-- Candle body -->
  <rect x="145" y="248" width="10" height="38" rx="3" fill="#fffbe6"/>
  <!-- Wax drips -->
  <path d="M145 258 Q141 266 143 271" fill="none" stroke="#fffde0" stroke-width="3.5" opacity=".55"/>
  <path d="M155 262 Q159 270 157 276" fill="none" stroke="#fffde0" stroke-width="3" opacity=".5"/>
  <!-- Flame -->
  <ellipse cx="150" cy="242" rx="5.5" ry="9" fill="#FF6B00" opacity=".92"/>
  <ellipse cx="150" cy="239" rx="3.5" ry="5.5" fill="#FFD700"/>
  <ellipse cx="150" cy="237" rx="2" ry="3" fill="white" opacity=".85"/>
  <ellipse cx="150" cy="241" rx="13" ry="16" fill="#ff9800" opacity=".18"/>
  <line x1="150" y1="248" x2="150" y2="242" stroke="#333" stroke-width="1.5"/>

  <!-- Wine glasses (clinking together at center) -->
  <!-- TIM's glass (left, tilted right for clink) -->
  <g transform="rotate(12, 105, 260)">
    <path d="M93 252 Q81 275 85 288 Q93 294 108 289 Q122 275 114 252 Z" fill="#9e0000" opacity=".65"/>
    <path d="M93 252 Q81 275 85 288 Q93 294 108 289 Q122 275 114 252 Z" fill="none" stroke="#e0d0c0" stroke-width="2"/>
    <!-- Wine level -->
    <path d="M96 275 Q82 282 86 288 Q93 293 108 288 Q119 280 112 273 Z" fill="#6B0000" opacity=".55"/>
    <!-- Stem -->
    <line x1="103" y1="289" x2="103" y2="315" stroke="#e0d0c0" stroke-width="3"/>
    <!-- Base -->
    <ellipse cx="103" cy="316" rx="15" ry="5.5" fill="#e0d0c0" opacity=".8"/>
  </g>

  <!-- AMY's glass (right, tilted left for clink) -->
  <g transform="rotate(-12, 195, 260)">
    <path d="M183 252 Q171 275 175 288 Q183 294 198 289 Q212 275 204 252 Z" fill="#9e0000" opacity=".65"/>
    <path d="M183 252 Q171 275 175 288 Q183 294 198 289 Q212 275 204 252 Z" fill="none" stroke="#e0d0c0" stroke-width="2"/>
    <!-- Wine level -->
    <path d="M186 275 Q172 282 176 288 Q183 293 198 288 Q209 280 202 273 Z" fill="#6B0000" opacity=".55"/>
    <line x1="193" y1="289" x2="193" y2="315" stroke="#e0d0c0" stroke-width="3"/>
    <ellipse cx="193" cy="316" rx="15" ry="5.5" fill="#e0d0c0" opacity=".8"/>
  </g>

  <!-- Clink sparkle effect -->
  <text x="150" y="248" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#FFD700" opacity=".9">✨</text>

  <!-- Small plates -->
  <ellipse cx="102" cy="300" rx="22" ry="9" fill="#f0ece4" stroke="#ddd" stroke-width="1.5"/>
  <ellipse cx="198" cy="300" rx="22" ry="9" fill="#f0ece4" stroke="#ddd" stroke-width="1.5"/>

  <!-- TIM (left, seated, torso visible) -->
  <!-- Suit/shirt body -->
  <rect x="44" y="220" width="58" height="65" rx="10" fill="#1a2a4a"/>
  <!-- White shirt collar -->
  <path d="M65 220 L73 220 L76 232 L66 226 Z" fill="white" opacity=".9"/>
  <path d="M73 220 L81 220 L78 232 L76 232 Z" fill="white" opacity=".9"/>
  <!-- Tie -->
  <path d="M73 220 L76 220 L79 240 L73 238 Z" fill="#cc2222" opacity=".85"/>
  <!-- Head -->
  <circle cx="73" cy="195" r="28" fill="#E8B08A"/>
  <!-- Blond hair -->
  <path d="M46 186 Q49 163 73 159 Q97 163 100 186" fill="#C4965A"/>
  <rect x="45" y="170" width="56" height="19" rx="9" fill="#C4965A"/>
  <!-- Warm smile -->
  <path d="M60 208 Q73 218 86 208" fill="none" stroke="#8B5E52" stroke-width="3" stroke-linecap="round"/>
  <path d="M61 209 Q73 215 85 209" fill="#cc8877" opacity=".25"/>
  <!-- Eyes (warm, happy) -->
  <circle cx="62" cy="193" r="6.5" fill="white"/>
  <circle cx="84" cy="193" r="6.5" fill="white"/>
  <circle cx="63" cy="193" r="4" fill="#1a1a1a"/>
  <circle cx="85" cy="193" r="4" fill="#1a1a1a"/>
  <circle cx="64" cy="192" r="1.5" fill="white"/>
  <circle cx="86" cy="192" r="1.5" fill="white"/>
  <!-- Candlelight warmth on cheeks -->
  <ellipse cx="56" cy="205" rx="9" ry="6" fill="#ff9800" opacity=".2"/>
  <ellipse cx="90" cy="205" rx="9" ry="6" fill="#ff9800" opacity=".2"/>
  <!-- Left arm at table -->
  <rect x="44" y="250" width="28" height="40" rx="12" fill="#1a2a4a" transform="rotate(-8 44 270)"/>
  <ellipse cx="56" cy="292" rx="14" ry="10" fill="#E8B08A" transform="rotate(-8 56 292)"/>

  <!-- AMY (right, seated, torso visible) -->
  <!-- Dress -->
  <rect x="198" y="220" width="58" height="65" rx="10" fill="#6a0032"/>
  <!-- Head -->
  <circle cx="227" cy="195" r="28" fill="#F5C5A3"/>
  <!-- Dark hair -->
  <ellipse cx="227" cy="177" rx="28" ry="20" fill="#2C1810"/>
  <path d="M200 188 Q192 202 194 224 Q203 220 202 208 Q201 197 202 191 Z" fill="#2C1810"/>
  <path d="M254 188 Q262 202 260 224 Q251 220 252 208 Q253 197 252 191 Z" fill="#2C1810"/>
  <!-- Warm smile -->
  <path d="M214 208 Q227 219 240 208" fill="none" stroke="#8B5E52" stroke-width="3" stroke-linecap="round"/>
  <path d="M215 209 Q227 215 239 209" fill="#cc8877" opacity=".25"/>
  <!-- Sparkling eyes -->
  <circle cx="216" cy="193" r="6.5" fill="white"/>
  <circle cx="238" cy="193" r="6.5" fill="white"/>
  <circle cx="217" cy="193" r="4" fill="#1a1a1a"/>
  <circle cx="239" cy="193" r="4" fill="#1a1a1a"/>
  <circle cx="218" cy="192" r="1.5" fill="white"/>
  <circle cx="240" cy="192" r="1.5" fill="white"/>
  <!-- Candlelight glow on cheeks -->
  <ellipse cx="210" cy="205" rx="9" ry="6" fill="#ff9800" opacity=".2"/>
  <ellipse cx="244" cy="205" rx="9" ry="6" fill="#ff9800" opacity=".2"/>
  <!-- Right arm at table -->
  <rect x="228" y="250" width="28" height="40" rx="12" fill="#6a0032" transform="rotate(8 228 270)"/>
  <ellipse cx="244" cy="292" rx="14" ry="10" fill="#F5C5A3" transform="rotate(8 244 292)"/>

  <!-- Proost speech bubble (center top) -->
  <rect x="88" y="120" width="124" height="48" rx="10" fill="white" opacity=".9"/>
  <!-- Tail from center -->
  <circle cx="148" cy="168" r="5" fill="white" opacity=".9"/>
  <circle cx="150" cy="178" r="3.5" fill="white" opacity=".9"/>
  <text x="150" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#C9A000">Proost! 🥂</text>
  <text x="150" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">op ons mooie weekend!</text>

  <!-- Floating sparkles ambiance -->
  <text x="25" y="185" font-family="sans-serif" font-size="13" fill="#FFD700" opacity=".35">✦</text>
  <text x="268" y="175" font-family="sans-serif" font-size="11" fill="#FFD700" opacity=".3">✦</text>
  <text x="38" y="300" font-family="sans-serif" font-size="10" fill="#FFD700" opacity=".2">✨</text>
  <text x="256" y="295" font-family="sans-serif" font-size="10" fill="#FFD700" opacity=".2">✨</text>

  <!-- Caption bar -->
  <rect x="0" y="370" width="300" height="30" fill="rgba(0,0,0,0.5)"/>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Diner – april 2026 🕯️</text>
</svg>
