<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87c46b"/>
      <stop offset="100%" stop-color="#4a8c2a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky2)"/>
  <!-- Back trees -->
  <ellipse cx="80" cy="200" rx="70" ry="90" fill="#2d6e1a"/>
  <rect x="72" y="250" width="16" height="120" fill="#5c3a1e"/>
  <ellipse cx="720" cy="180" rx="80" ry="100" fill="#2d6e1a"/>
  <rect x="712" y="240" width="18" height="130" fill="#5c3a1e"/>
  <ellipse cx="160" cy="300" rx="55" ry="70" fill="#3a7c22"/>
  <ellipse cx="630" cy="310" rx="60" ry="75" fill="#3a7c22"/>
  <!-- Ground -->
  <ellipse cx="400" cy="560" rx="500" ry="150" fill="#3d8c20"/>
  <!-- Jungle floor details -->
  <ellipse cx="100" cy="460" rx="60" ry="20" fill="#2d6e1a"/>
  <ellipse cx="680" cy="450" rx="55" ry="18" fill="#2d6e1a"/>

  <!-- T-REX body -->
  <!-- Tail -->
  <path d="M120 310 Q80 340 60 380 Q70 390 85 382 Q110 345 140 330" fill="#5a8c3a"/>
  <!-- Main body -->
  <ellipse cx="320" cy="320" rx="130" ry="90" fill="#5a8c3a"/>
