  <path d="M370 240 Q390 210 420 200 Q460 190 480 210 Q490 225 480 245 Q460 260 430 270 Q400 275 380 265 Z" fill="#5a8c3a"/>
  <!-- Head -->
  <ellipse cx="510" cy="215" rx="70" ry="45" fill="#5a8c3a"/>
  <!-- Snout/jaw -->
  <path d="M455 225 Q510 260 570 240 Q575 225 565 215 Q510 230 460 215 Z" fill="#4a7c2a"/>
  <!-- Eye -->
  <circle cx="540" cy="200" r="12" fill="white"/>
  <circle cx="543" cy="200" r="7" fill="#1a1a00"/>
  <circle cx="545" cy="197" r="2" fill="white"/>
  <!-- Teeth (friendly) -->
  <rect x="470" y="230" width="10" height="18" rx="3" fill="white"/>
  <rect x="488" y="232" width="10" height="16" rx="3" fill="white"/>
  <rect x="506" y="232" width="10" height="16" rx="3" fill="white"/>
  <rect x="524" y="230" width="10" height="18" rx="3" fill="white"/>
  <!-- Big smile line -->
  <path d="M458 225 Q510 255 565 238" fill="none" stroke="#3a6a1a" stroke-width="3"/>
  <!-- Nostrils -->
  <ellipse cx="568" cy="208" rx="5" ry="3" fill="#3a6a1a"/>
  <!-- Arms (tiny T-Rex arms) -->
  <path d="M390 285 Q370 300 360 320 Q370 325 375 315 Q385 298 395 295 Z" fill="#5a8c3a"/>
  <!-- Legs -->
  <path d="M250 390 Q230 430 225 460 L255 462 Q258 432 268 400 Z" fill="#4a7c2a"/>
  <path d="M350 400 Q340 440 338 465 L368 466 Q368 440 375 408 Z" fill="#4a7c2a"/>
  <!-- Feet -->
  <ellipse cx="240" cy="463" rx="28" ry="12" fill="#3a6a1a"/>
  <ellipse cx="353" cy="467" rx="28" ry="12" fill="#3a6a1a"/>
  <!-- Scales/texture dots -->
  <circle cx="300" cy="300" r="4" fill="#4a7c2a"/>
  <circle cx="330" cy="280" r="3" fill="#4a7c2a"/>
  <circle cx="360" cy="310" r="4" fill="#4a7c2a"/>

  <!-- TIM on T-Rex back (scared, gripping) -->
  <!-- Body -->
  <rect x="258" y="228" width="54" height="62" rx="12" fill="#3a5fa8"/>
  <!-- Arms gripping -->
  <path d="M258 248 Q235 255 228 270 Q238 278 248 270 Q256 258 262 252 Z" fill="#3a5fa8"/>
  <path d="M312 248 Q335 255 342 270 Q332 278 322 270 Q314 258 308 252 Z" fill="#3a5fa8"/>
  <!-- Legs straddling -->
  <rect x="262" y="285" width="20" height="40" rx="8" fill="#2d4080"/>
  <rect x="292" y="285" width="20" height="40" rx="8" fill="#2d4080"/>
  <!-- Head -->
  <circle cx="289" cy="218" r="28" fill="#E8B08A"/>
  <!-- Short hair -->
  <path d="M264 210 Q266 190 289 187 Q312 190 314 210" fill="#C4965A"/>
  <rect x="262" y="196" width="54" height="14" rx="7" fill="#C4965A"/>
  <!-- Eyes (wide/scared) -->
  <circle cx="278" cy="216" r="6" fill="white"/>
  <circle cx="300" cy="216" r="6" fill="white"/>
  <circle cx="279" cy="217" r="3.5" fill="#444"/>
  <circle cx="301" cy="217" r="3.5" fill="#444"/>
  <!-- Scared mouth -->
  <path d="M278 230 Q289 224 300 230" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sweat drops -->
  <text x="316" y="205" font-family="sans-serif" font-size="16">💦</text>

  <!-- AMY on T-Rex back (excited) -->
  <!-- Body -->
  <rect x="178" y="235" width="50" height="58" rx="12" fill="#e05a7a"/>
  <!-- Arms up (excited) -->
  <path d="M178 248 Q160 235 152 218 Q162 212 168 224 Q175 240 182 246 Z" fill="#e05a7a"/>
  <path d="M228 248 Q246 235 254 218 Q244 212 238 224 Q231 240 227 246 Z" fill="#e05a7a"/>
  <!-- Legs -->
  <rect x="182" y="290" width="18" height="38" rx="8" fill="#c04060"/>
  <rect x="206" y="290" width="18" height="38" rx="8" fill="#c04060"/>
  <!-- Head -->
  <circle cx="203" cy="225" r="26" fill="#F5C5A3"/>
  <!-- Long dark hair -->
  <ellipse cx="203" cy="210" rx="26" ry="18" fill="#2C1810"/>
  <path d="M178 220 Q172 240 175 265 Q182 262 183 245 Q182 228 182 222 Z" fill="#2C1810"/>
  <path d="M228 220 Q234 240 231 265 Q224 262 223 245 Q224 228 224 222 Z" fill="#2C1810"/>
  <!-- Eyes (excited) -->
  <circle cx="195" cy="223" r="5" fill="#444"/>
  <circle cx="211" cy="223" r="5" fill="#444"/>
  <circle cx="196" cy="222" r="1.5" fill="white"/>
  <circle cx="212" cy="222" r="1.5" fill="white"/>
  <!-- Big smile -->
  <path d="M192 236 Q203 246 214 237" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hands up emoji -->
  <text x="138" y="210" font-family="sans-serif" font-size="22">🙌</text>

  <!-- Leaves in foreground -->
  <ellipse cx="20" cy="480" rx="80" ry="40" fill="#2d6e1a" opacity=".8"/>
  <ellipse cx="780" cy="490" rx="80" ry="40" fill="#2d6e1a" opacity=".8"/>

  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#c8f0a0" opacity=".9">Die keer dat we een T-Rex temden 🦕</text>
</svg>
