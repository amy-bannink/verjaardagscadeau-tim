  <circle cx="310" cy="80" r="8" fill="#f5a0a0"/><circle cx="340" cy="88" r="8" fill="#f0f0a0"/><circle cx="370" cy="82" r="8" fill="#a0c0f5"/>
  <circle cx="400" cy="92" r="8" fill="#f5c8a0"/><circle cx="430" cy="78" r="8" fill="#f5a0a0"/><circle cx="460" cy="90" r="8" fill="#a0f0a0"/>
