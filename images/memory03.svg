  <path d="M333 288 Q312 278 304 260 Q316 254 322 268 Q330 280 337 286 Z" fill="#E8B08A"/>
  <path d="M385 288 Q406 278 414 260 Q402 254 396 268 Q388 280 384 286 Z" fill="#E8B08A"/>
