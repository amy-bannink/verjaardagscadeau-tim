  <circle cx="325" cy="108" r="8" fill="#f0f0a0"/><circle cx="355" cy="118" r="8" fill="#a0c0f5"/><circle cx="385" cy="124" r="8" fill="#f5a0a0"/>
  <circle cx="415" cy="112" r="8" fill="#f5c8a0"/><circle cx="445" cy="118" r="8" fill="#a0f0a0"/><circle cx="475" cy="124" r="8" fill="#c0a0f5"/>
  <circle cx="505" cy="110" r="8" fill="#f5a0a0"/><circle cx="535" cy="120" r="8" fill="#f0f0a0"/><circle cx="565" cy="108" r="8" fill="#a0c0f5"/>
  <circle cx="595" cy="118" r="8" fill="#f5c8a0"/><circle cx="625" cy="124" r="8" fill="#f5a0a0"/><circle cx="655" cy="112" r="8" fill="#a0f0a0"/>
  <circle cx="685" cy="118" r="8" fill="#c0a0f5"/><circle cx="715" cy="124" r="8" fill="#f5a0a0"/><circle cx="745" cy="110" r="8" fill="#f0f0a0"/>
