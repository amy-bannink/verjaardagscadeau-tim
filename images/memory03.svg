  <path d="M338 254 Q330 262 328 275" fill="none" stroke="#C4965A" stroke-width="5" stroke-linecap="round"/>
  <path d="M380 254 Q388 262 390 275" fill="none" stroke="#C4965A" stroke-width="5" stroke-linecap="round"/>
