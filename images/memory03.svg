  <!-- Wet drips -->
  <ellipse cx="355" cy="340" rx="8" ry="3" fill="#7dd4f8" opacity=".8"/>
  <rect x="344" y="290" width="4" height="40" rx="2" fill="#7dd4f8" opacity=".6"/>
  <rect x="370" y="295" width="3" height="35" rx="2" fill="#7dd4f8" opacity=".6"/>
