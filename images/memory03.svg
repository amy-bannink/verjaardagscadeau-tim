  <circle cx="670" cy="78" r="8" fill="#a0f0a0"/><circle cx="700" cy="90" r="8" fill="#c0a0f5"/><circle cx="730" cy="85" r="8" fill="#f5a0a0"/>
  <circle cx="760" cy="95" r="8" fill="#f0f0a0"/>
  <!-- Second row -->
