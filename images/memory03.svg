  <text x="359" y="304" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c9a000">🥇</text>
  <!-- Water drops on face -->
  <circle cx="340" cy="270" r="2" fill="#7dd4f8"/>
  <circle cx="378" cy="268" r="2" fill="#7dd4f8"/>

  <!-- AMY on gold (right side, soaking wet) -->
  <!-- Wet drips -->
  <ellipse cx="445" cy="340" rx="8" ry="3" fill="#7dd4f8" opacity=".8"/>
  <rect x="434" y="285" width="4" height="45" rx="2" fill="#7dd4f8" opacity=".6"/>
  <rect x="456" y="290" width="3" height="40" rx="2" fill="#7dd4f8" opacity=".6"/>
  <!-- Body -->
  <rect x="422" y="278" width="48" height="62" rx="10" fill="#e05a7a"/>
  <!-- Arms up -->
  <path d="M422 288 Q401 278 393 260 Q405 254 411 268 Q419 280 426 286 Z" fill="#F5C5A3"/>
  <path d="M470 288 Q491 278 499 260 Q487 254 481 268 Q473 280 469 286 Z" fill="#F5C5A3"/>
  <!-- Legs -->
  <rect x="427" y="336" width="16" height="8" rx="4" fill="#c04060"/>
  <rect x="449" y="336" width="16" height="8" rx="4" fill="#c04060"/>
  <!-- Head -->
  <circle cx="446" cy="262" r="26" fill="#F5C5A3"/>
  <!-- Wet dark hair (dripping) -->
  <ellipse cx="446" cy="248" rx="27" ry="18" fill="#2C1810"/>
  <path d="M421 255 Q414 272 416 292 Q424 288 424 275 Q424 262 424 258 Z" fill="#2C1810"/>
  <path d="M471 255 Q478 272 476 292 Q468 288 468 275 Q468 262 468 258 Z" fill="#2C1810"/>
  <!-- Water drops on hair -->
  <circle cx="415" cy="295" r="3" fill="#7dd4f8"/>
  <circle cx="477" cy="293" r="3" fill="#7dd4f8"/>
  <!-- Eyes (excited) -->
  <circle cx="438" cy="260" r="4.5" fill="#444"/>
  <circle cx="454" cy="260" r="4.5" fill="#444"/>
  <circle cx="439" cy="259" r="1.5" fill="white"/>
  <circle cx="455" cy="259" r="1.5" fill="white"/>
  <!-- Big smile -->
  <path d="M436 273 Q446 283 456 273" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Medal -->
  <circle cx="446" cy="300" r="10" fill="#F5C518" stroke="#c9a000" stroke-width="2"/>
  <text x="446" y="304" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c9a000">🥇</text>

  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" opacity=".9">Goud op de Olympische Spelen 🥇</text>
