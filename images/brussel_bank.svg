<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">

  <!-- Room background -->
  <rect width="300" height="400" fill="#F0EDE8"/>
  <!-- Wall -->
  <rect width="300" height="270" fill="#E8E2D8"/>
  <!-- Baseboard -->
  <rect y="265" width="300" height="8" fill="#D5CFC4"/>
  <!-- Floor -->
  <rect y="273" width="300" height="127" fill="#C8B99A"/>
  <!-- Floor wood lines -->
  <line x1="0" y1="295" x2="300" y2="295" stroke="#B8A88A" stroke-width="1.5"/>
  <line x1="0" y1="320" x2="300" y2="320" stroke="#B8A88A" stroke-width="1.5"/>
  <line x1="0" y1="345" x2="300" y2="345" stroke="#B8A88A" stroke-width="1.5"/>
  <line x1="80"  y1="273" x2="80"  y2="400" stroke="#B8A88A" stroke-width="1"/>
  <line x1="180" y1="273" x2="180" y2="400" stroke="#B8A88A" stroke-width="1"/>

  <!-- Window on wall -->
  <rect x="108" y="30" width="84" height="70" rx="4" fill="#AED6F1" stroke="#999" stroke-width="3"/>
  <line x1="150" y1="30" x2="150" y2="100" stroke="#999" stroke-width="2"/>
  <line x1="108" y1="65" x2="192" y2="65" stroke="#999" stroke-width="2"/>
  <!-- Window light -->
  <rect x="111" y="33" width="36" height="29" fill="#D6EAF8" opacity=".6"/>
  <rect x="153" y="33" width="36" height="29" fill="#D6EAF8" opacity=".6"/>

  <!-- Empty bottles/cups on floor in front of couch -->
  <!-- Bottle 1 -->
  <rect x="30" y="255" width="8" height="22" fill="#5D4037" rx="2"/>
  <rect x="32" y="252" width="4" height="6" fill="#4E342E" rx="1"/>
  <!-- Bottle 2 -->
  <rect x="48" y="258" width="7" height="18" fill="#1565C0" rx="2"/>
  <rect x="50" y="255" width="3" height="5" fill="#0D47A1" rx="1"/>
  <!-- Cup fallen over -->
  <ellipse cx="242" cy="265" rx="10" ry="6" fill="#FF7043" opacity=".8" transform="rotate(-30, 242, 265)"/>
  <path d="M235 262 L232 280" stroke="#FF7043" stroke-width="4" stroke-linecap="round" opacity=".7"/>

  <!-- THE COUCH (big, comfy) -->
  <!-- Couch back -->
  <rect x="8" y="195" width="284" height="70" rx="16" fill="#8D6E63"/>
  <!-- Couch back highlight -->
  <rect x="14" y="200" width="272" height="28" rx="10" fill="#A1887F"/>
  <!-- Couch seat -->
  <rect x="8" y="248" width="284" height="42" rx="10" fill="#795548"/>
  <!-- Couch seat cushions divider -->
  <line x1="150" y1="250" x2="150" y2="290" stroke="#6D4C41" stroke-width="3"/>
  <!-- Couch armrests -->
  <rect x="4"   y="215" width="22" height="75" rx="10" fill="#6D4C41"/>
  <rect x="274" y="215" width="22" height="75" rx="10" fill="#6D4C41"/>
  <!-- Couch legs -->
  <rect x="18"  y="288" width="12" height="15" fill="#4E342E" rx="3"/>
  <rect x="270" y="288" width="12" height="15" fill="#4E342E" rx="3"/>

  <!-- === AMY (left side of couch, slumped) === -->
  <!-- Body slumped sideways -->
  <rect x="28" y="218" width="52" height="55" rx="10" fill="#E91E8C" transform="rotate(-8, 54, 245)"/>
  <!-- Left arm hanging off couch -->
  <path d="M34 248 L18 278" stroke="#F5C5A3" stroke-width="13" stroke-linecap="round" transform="rotate(-8, 54, 245)"/>
  <circle cx="16" cy="280" r="10" fill="#F5C5A3"/>
  <!-- Right arm on lap -->
  <path d="M80 238 L75 262" stroke="#F5C5A3" stroke-width="12" stroke-linecap="round"/>
  <circle cx="74" cy="265" r="9" fill="#F5C5A3"/>
  <!-- Legs up on couch (brak pose) -->
  <path d="M50 272 L80 278" stroke="#F5C5A3" stroke-width="14" stroke-linecap="round"/>
  <path d="M80 278 L90 265" stroke="#F5C5A3" stroke-width="14" stroke-linecap="round"/>
  <!-- Shoe -->
  <ellipse cx="92" cy="262" rx="12" ry="7" fill="#880E4F"/>
  <!-- Neck (tilted with head) -->
  <rect x="70" y="200" width="14" height="20" fill="#F5C5A3" rx="4" transform="rotate(-15, 77, 210)"/>
  <!-- Head (tilted/drooping) -->
  <circle cx="72" cy="186" r="27" fill="#F5C5A3" transform="rotate(-12, 72, 186)"/>
  <!-- Hair -->
  <ellipse cx="72" cy="165" rx="27" ry="16" fill="#2C1810" transform="rotate(-12, 72, 165)"/>
  <path d="M46 182 Q40 196 42 215 Q51 208 50 196 Q50 186 52 179 Z" fill="#2C1810"/>
  <!-- Eyes (half closed / tired) -->
  <path d="M62 182 Q68 179 74 182" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M79 182 Q85 179 91 182" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="68" cy="185" r="3" fill="#1a1a1a"/>
  <circle cx="85" cy="185" r="3" fill="#1a1a1a"/>
  <!-- Green/pale cheeks (sick) -->
  <ellipse cx="61" cy="192" rx="8" ry="5" fill="#A5D6A7" opacity=".5"/>
  <ellipse cx="91" cy="192" rx="7" ry="5" fill="#A5D6A7" opacity=".45"/>
  <!-- Wavy mouth (nauseous) -->
  <path d="M64 200 Q68 205 72 200 Q76 195 80 200" stroke="#b84c7d" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- === TIM (right side, GIANT & MUSCULAR, totally brak) === -->
  <!-- He takes up most of the right side of the couch, sprawled -->
  <!-- Legs stretched across couch -->
  <path d="M180 268 L120 272" stroke="#E8B08A" stroke-width="22" stroke-linecap="round"/>
  <path d="M200 270 L168 280" stroke="#E8B08A" stroke-width="22" stroke-linecap="round"/>
  <!-- Shoe left foot -->
  <ellipse cx="116" cy="273" rx="17" ry="8" fill="#333"/>
  <!-- Shoe right foot (up on armrest) -->
  <ellipse cx="165" cy="282" rx="17" ry="8" fill="#333" transform="rotate(15, 165, 280)"/>
  <!-- MASSIVE body slumped on couch back -->
  <rect x="175" y="200" width="95" height="75" rx="12" fill="#1565C0" transform="rotate(5, 222, 237)"/>
  <!-- Pec bumps -->
  <ellipse cx="200" cy="225" rx="20" ry="15" fill="#1976D2" opacity=".5"/>
  <ellipse cx="248" cy="222" rx="20" ry="15" fill="#1976D2" opacity=".5"/>
  <!-- HUGE left arm hanging limp off couch back -->
  <ellipse cx="162" cy="218" rx="24" ry="20" fill="#E8B08A"/>
  <path d="M180 228 L152 268" stroke="#E8B08A" stroke-width="19" stroke-linecap="round"/>
  <circle cx="150" cy="272" r="14" fill="#E8B08A"/>
  <!-- HUGE right arm on belly -->
  <ellipse cx="288" cy="218" rx="24" ry="20" fill="#E8B08A"/>
  <path d="M272 228 L255 255" stroke="#E8B08A" stroke-width="19" stroke-linecap="round"/>
  <circle cx="253" cy="258" r="14" fill="#E8B08A"/>
  <!-- Neck -->
  <rect x="212" y="180" width="28" height="22" fill="#E8B08A" rx="5" transform="rotate(8, 226, 191)"/>
  <!-- Head (tilted back on couch, looking at ceiling) -->
  <circle cx="226" cy="164" r="32" fill="#E8B08A" transform="rotate(10, 226, 164)"/>
  <!-- Hair -->
  <path d="M196 153 Q199 130 226 127 Q253 130 256 153" fill="#C4965A"/>
  <rect x="195" y="141" width="62" height="18" rx="9" fill="#C4965A"/>
  <!-- Eyes (barely open/half closed) -->
  <path d="M213 158 Q220 154 227 158" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M228 157 Q235 153 242 157" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="220" cy="161" r="3.5" fill="#1a1a1a"/>
  <circle cx="235" cy="160" r="3.5" fill="#1a1a1a"/>
  <!-- Green cheeks (brak!) -->
  <ellipse cx="211" cy="172" rx="10" ry="6" fill="#A5D6A7" opacity=".55"/>
  <ellipse cx="244" cy="172" rx="10" ry="6" fill="#A5D6A7" opacity=".55"/>
  <!-- Wavy/sad mouth -->
  <path d="M216 181 Q222 177 228 181 Q234 185 240 181" stroke="#7B4040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <ellipse cx="250" cy="150" rx="4" ry="6" fill="#90CAF9" opacity=".8"/>

  <!-- Speech bubble Amy -->
  <rect x="3" y="118" width="94" height="40" rx="8" fill="white" opacity=".93"/>
  <path d="M55,158 L50,172 L68,160 Z" fill="white" opacity=".93"/>
  <text x="50" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E91E8C">ohhh nee... 🤢</text>
  <text x="50" y="151" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">nooit weer zoveel 😵</text>

  <!-- Speech bubble Tim -->
  <rect x="188" y="100" width="108" height="40" rx="8" fill="white" opacity=".93"/>
  <path d="M226,140 L220,154 L238,142 Z" fill="white" opacity=".93"/>
  <text x="242" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1565C0">ik leef nog... 😵</text>
  <text x="242" y="133" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">geloof ik 🥴</text>

  <!-- Caption -->
  <rect x="0" y="370" width="300" height="30" fill="rgba(0,0,0,0.45)"/>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">De ochtend erna – april 2026 🥴</text>
</svg>
