<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="desert10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c30"/>
      <stop offset="55%" stop-color="#e8b060"/>
      <stop offset="100%" stop-color="#c87820"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#desert10)"/>
  <!-- Sun blazing -->
  <circle cx="400" cy="70" r="50" fill="#fff060" opacity=".95"/>
  <circle cx="400" cy="70" r="38" fill="#fff8a0"/>
  <!-- Heat haze lines -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#e89040" stroke-width="1.5" opacity=".3"/>
  <line x1="150" y1="370" x2="650" y2="370" stroke="#e89040" stroke-width="1.5" opacity=".25"/>
  <!-- Dust cloud at feet -->
  <ellipse cx="400" cy="440" rx="250" ry="30" fill="#c87820" opacity=".4"/>
  <ellipse cx="340" cy="448" rx="80" ry="15" fill="#c87820" opacity=".3"/>
  <ellipse cx="460" cy="445" rx="70" ry="14" fill="#c87820" opacity=".3"/>

  <!-- Desert ground -->
  <ellipse cx="400" cy="560" rx="600" ry="180" fill="#b86e10"/>
  <!-- Sand texture/dunes -->
  <path d="M0 420 Q100 400 200 420 Q300 440 400 420 Q500 400 600 420 Q700 440 800 420 L800 500 L0 500 Z" fill="#c87820"/>

  <!-- Cactus left -->
  <rect x="80" y="260" width="25" height="150" rx="12" fill="#3a8c22"/>
  <rect x="40" y="290" width="70" height="20" rx="10" fill="#3a8c22"/>
  <rect x="38" y="260" width="20" height="55" rx="10" fill="#3a8c22"/>
  <rect x="72" y="260" width="20" height="40" rx="10" fill="#3a8c22"/>
  <!-- Cactus needles -->
  <line x1="70" y1="280" x2="60" y2="275" stroke="#4a9c2a" stroke-width="2"/>
  <line x1="115" y1="280" x2="125" y2="275" stroke="#4a9c2a" stroke-width="2"/>
  <line x1="90" y1="330" x2="80" y2="323" stroke="#4a9c2a" stroke-width="2"/>

  <!-- Cactus right -->
  <rect x="690" y="250" width="28" height="160" rx="13" fill="#3a8c22"/>
  <rect x="650" y="280" width="75" height="22" rx="11" fill="#3a8c22"/>
  <rect x="648" y="250" width="22" height="60" rx="11" fill="#3a8c22"/>
  <rect x="698" y="255" width="22" height="45" rx="11" fill="#3a8c22"/>
  <!-- Skull in sand -->
  <circle cx="600" cy="418" r="18" fill="#e0d8c0"/>
  <circle cx="594" cy="414" r="5" fill="#4a4030"/>
  <circle cx="606" cy="414" r="5" fill="#4a4030"/>
  <path d="M591 424 L609 424 M594 428 L606 428" stroke="#4a4030" stroke-width="2"/>
  <!-- Tumbleweed -->
  <circle cx="150" cy="400" r="22" fill="none" stroke="#8B6020" stroke-width="3"/>
  <line x1="130" y1="388" x2="170" y2="412" stroke="#8B6020" stroke-width="2"/>
  <line x1="130" y1="412" x2="170" y2="388" stroke="#8B6020" stroke-width="2"/>
  <line x1="128" y1="400" x2="172" y2="400" stroke="#8B6020" stroke-width="2"/>
  <!-- "DUEL" sign post -->
  <rect x="388" y="200" width="8" height="120" fill="#8B5E2A"/>
  <rect x="362" y="195" width="60" height="28" rx="3" fill="#c8a060"/>
  <text x="392" y="214" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#3a2010">DUEL</text>

  <!-- DUEL distance marker -->
  <line x1="230" y1="415" x2="570" y2="415" stroke="#8B5E2A" stroke-width="2" stroke-dasharray="8,6" opacity=".6"/>

  <!-- TIM (left, cowboy, nervous duel stance) -->
  <!-- Boots/spurs -->
  <ellipse cx="215" cy="430" rx="20" ry="9" fill="#5c3010"/>
  <ellipse cx="247" cy="430" rx="20" ry="9" fill="#5c3010"/>
  <!-- Spur details -->
  <path d="M205 430 L198 436" stroke="#c0c0c0" stroke-width="2"/>
  <path d="M237 430 L230 436" stroke="#c0c0c0" stroke-width="2"/>
  <!-- Jeans/pants -->
  <rect x="208" y="330" width="22" height="105" rx="10" fill="#3a5fa8"/>
  <rect x="236" y="330" width="22" height="105" rx="10" fill="#3a5fa8"/>
  <!-- Holster belt -->
  <rect x="200" y="320" width="66" height="14" rx="5" fill="#8B5E2A"/>
  <rect x="224" y="318" width="18" height="18" rx="3" fill="#c9a000"/>
  <!-- Holster -->
  <path d="M206 334 Q205 360 210 368 L220 368 Q225 360 222 334 Z" fill="#6a3a10"/>
  <!-- Gun grip visible in holster -->
  <rect x="210" y="330" width="8" height="12" rx="2" fill="#333"/>
  <!-- Body/shirt -->
  <rect x="198" y="230" width="70" height="96" rx="12" fill="#e08830"/>
  <!-- Vest -->
  <path d="M198 230 L233 252 L233 325 L198 325 Z" fill="#8B5E2A"/>
  <path d="M268 230 L233 252 L233 325 L268 325 Z" fill="#8B5E2A"/>
  <!-- Sheriff badge -->
  <path d="M225 270 L228 262 L231 270 L239 270 L233 275 L235 283 L228 278 L221 283 L223 275 L217 270 Z" fill="#c9a000"/>
  <!-- Arms (hands hovering near holster, nervous) -->
  <rect x="168" y="240" width="32" height="60" rx="11" fill="#e08830"/>
  <rect x="266" y="240" width="32" height="60" rx="11" fill="#e08830"/>
  <!-- Hands -->
  <ellipse cx="184" cy="303" rx="14" ry="10" fill="#E8B08A"/>
  <ellipse cx="282" cy="303" rx="14" ry="10" fill="#E8B08A"/>
  <!-- Hovering fingers -->
  <rect x="176" y="296" width="5" height="12" rx="2" fill="#E8B08A"/>
  <rect x="183" y="294" width="5" height="14" rx="2" fill="#E8B08A"/>
  <rect x="190" y="296" width="5" height="12" rx="2" fill="#E8B08A"/>
  <rect x="274" y="296" width="5" height="12" rx="2" fill="#E8B08A"/>
  <rect x="281" y="294" width="5" height="14" rx="2" fill="#E8B08A"/>
  <rect x="288" y="296" width="5" height="12" rx="2" fill="#E8B08A"/>
  <!-- Head -->
  <circle cx="233" cy="210" r="33" fill="#E8B08A"/>
  <!-- Cowboy hat -->
  <ellipse cx="233" cy="184" rx="40" ry="12" fill="#5c3010"/>
  <path d="M194 184 Q233 154 272 184 Z" fill="#5c3010"/>
  <ellipse cx="233" cy="183" rx="42" ry="8" fill="#6a3810"/>
  <!-- Hat band -->
  <ellipse cx="233" cy="184" rx="38" ry="9" fill="none" stroke="#c9a000" stroke-width="3"/>
  <!-- Eyes (nervous, squinting) -->
  <path d="M220 207 Q233 204 246 207" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Sweat drop -->
  <circle cx="264" cy="208" r="4" fill="#7dd4f8"/>
  <!-- Nervous smile -->
  <path d="M222 222 Q233 229 244 222" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stubble -->
  <ellipse cx="233" cy="226" rx="16" ry="7" fill="#b07040" opacity=".3"/>

  <!-- AMY (right, cowgirl, cool and confident) -->
  <!-- Boots -->
  <ellipse cx="540" cy="430" rx="20" ry="9" fill="#3a1808"/>
  <ellipse cx="572" cy="430" rx="20" ry="9" fill="#3a1808"/>
  <!-- Decorative boot stitching -->
  <path d="M533 418 Q535 408 540 405 Q545 408 547 418" fill="none" stroke="#c9a000" stroke-width="1.5"/>
  <!-- Pants/skirt combo -->
  <rect x="535" y="330" width="22" height="105" rx="10" fill="#8B1a1a"/>
  <rect x="563" y="330" width="22" height="105" rx="10" fill="#8B1a1a"/>
  <!-- Holster belt -->
  <rect x="528" y="318" width="66" height="14" rx="5" fill="#8B5E2A"/>
  <rect x="552" y="316" width="18" height="18" rx="3" fill="#c9a000"/>
  <!-- Holster with gun ready -->
  <path d="M534 332 Q533 358 538 366 L548 366 Q553 358 550 332 Z" fill="#6a3a10"/>
  <rect x="538" y="327" width="8" height="14" rx="2" fill="#333"/>
  <!-- Body/shirt -->
  <rect x="527" y="228" width="68" height="96" rx="12" fill="#cc2222"/>
  <!-- Vest/jacket -->
  <path d="M527 228 L561 248 L561 323 L527 323 Z" fill="#8B1a1a"/>
  <path d="M595 228 L561 248 L561 323 L595 323 Z" fill="#8B1a1a"/>
  <!-- Arms (confident, cool pose – one hand on hip, one hovering) -->
  <rect x="497" y="238" width="32" height="60" rx="11" fill="#cc2222"/>
  <rect x="595" y="238" width="32" height="60" rx="11" fill="#cc2222"/>
  <ellipse cx="513" cy="300" rx="14" ry="10" fill="#F5C5A3"/>
  <ellipse cx="611" cy="300" rx="14" ry="10" fill="#F5C5A3"/>
  <!-- Cool hovering fingers right hand -->
  <rect x="603" y="294" width="5" height="12" rx="2" fill="#F5C5A3"/>
  <rect x="610" y="292" width="5" height="14" rx="2" fill="#F5C5A3"/>
  <rect x="617" y="294" width="5" height="12" rx="2" fill="#F5C5A3"/>
  <!-- Head -->
  <circle cx="561" cy="208" r="30" fill="#F5C5A3"/>
  <!-- Cowboy hat (stylish, tilted) -->
  <ellipse cx="565" cy="183" rx="38" ry="11" fill="#1a1a1a" transform="rotate(-5 565 183)"/>
  <path d="M528 185 Q565 154 602 185 Z" fill="#1a1a1a" transform="rotate(-5 565 185)"/>
  <ellipse cx="565" cy="182" rx="40" ry="8" fill="#2a2a2a" transform="rotate(-5 565 182)"/>
  <!-- Red hat band -->
  <ellipse cx="565" cy="183" rx="36" ry="8" fill="none" stroke="#cc2222" stroke-width="2.5" transform="rotate(-5 565 183)"/>
  <!-- Long hair out from under hat -->
  <path d="M533 200 Q522 218 524 245 Q534 240 533 228 Q532 215 534 205 Z" fill="#2C1810"/>
  <path d="M589 200 Q602 215 600 242 Q590 237 591 225 Q592 212 590 205 Z" fill="#2C1810"/>
  <!-- Eyes (cool, confident) -->
  <circle cx="551" cy="206" r="4.5" fill="#444"/>
  <circle cx="571" cy="205" r="4.5" fill="#444"/>
  <circle cx="552" cy="205" r="1.5" fill="white"/>
  <circle cx="572" cy="204" r="1.5" fill="white"/>
  <!-- Confident half-smile -->
  <path d="M551 219 Q562 228 572 222" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dust particles between them -->
  <circle cx="400" cy="380" r="3" fill="#c87820" opacity=".5"/>
  <circle cx="380" cy="395" r="2" fill="#c87820" opacity=".4"/>
  <circle cx="420" cy="390" r="2.5" fill="#c87820" opacity=".4"/>
  <circle cx="400" cy="405" r="2" fill="#c87820" opacity=".3"/>

  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff3b0" opacity=".9">Cowboys in het Wilde Westen 🤠</text>
</svg>
