  <circle cx="233" cy="138" r="6"   fill="white"/>
  <circle cx="212" cy="138" r="3.8" fill="#1a1a1a"/>
  <circle cx="234" cy="138" r="3.8" fill="#1a1a1a"/>
  <circle cx="213" cy="137" r="1.5" fill="white"/>
