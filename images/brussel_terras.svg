  <rect x="4" y="88" width="86" height="38" rx="8" fill="white" opacity=".93"/>
  <path d="M58,126 L52,138 L70,128 Z" fill="white" opacity=".93"/>
  <text x="47" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e91e8c">Proost! 🥂</text>
  <text x="47" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">op ons mooie weekend!</text>

  <!-- Speech bubble Tim -->
  <rect x="192" y="68" width="102" height="38" rx="8" fill="white" opacity=".93"/>
  <path d="M222,106 L216,118 L234,108 Z" fill="white" opacity=".93"/>
  <text x="243" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1565c0">Kaaaaas!! 😄</text>
  <text x="243" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">herinneringen maken!</text>

  <!-- Caption -->
  <rect x="0" y="370" width="300" height="30" fill="rgba(0,0,0,0.45)"/>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Terras – april 2026 ☀️</text>
