<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="portal_bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a40"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
    <radialGradient id="portal_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C518" stop-opacity=".6"/>
      <stop offset="50%" stop-color="#ff8800" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#cc44ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portal_inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaeeff"/>
      <stop offset="40%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#1a0a40"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#portal_bg)"/>

  <!-- Stars -->
  <circle cx="40" cy="30" r="1.5" fill="white" opacity=".9"/>
  <circle cx="110" cy="15" r="1" fill="white" opacity=".8"/>
  <circle cx="180" cy="50" r="2" fill="white" opacity=".7"/>
  <circle cx="260" cy="22" r="1" fill="white" opacity=".9"/>
  <circle cx="60" cy="90" r="1.5" fill="white" opacity=".7"/>
  <circle cx="680" cy="25" r="2" fill="white" opacity=".8"/>
  <circle cx="740" cy="60" r="1" fill="white" opacity=".9"/>
  <circle cx="770" cy="20" r="1.5" fill="white" opacity=".7"/>
  <circle cx="620" cy="45" r="1" fill="white" opacity=".8"/>
  <circle cx="550" cy="15" r="2" fill="white" opacity=".7"/>
  <circle cx="30" cy="200" r="1" fill="white" opacity=".6"/>
  <circle cx="760" cy="180" r="1.5" fill="white" opacity=".6"/>
  <circle cx="80" cy="390" r="1" fill="white" opacity=".5"/>
  <circle cx="720" cy="400" r="1.5" fill="white" opacity=".5"/>
  <circle cx="340" cy="440" r="1" fill="white" opacity=".6"/>

  <!-- Swirling time portal (center) -->
  <circle cx="400" cy="250" r="160" fill="url(#portal_glow)" opacity=".8"/>
  <circle cx="400" cy="250" r="130" fill="none" stroke="#cc44ff" stroke-width="8" opacity=".5"/>
  <circle cx="400" cy="250" r="115" fill="none" stroke="#4488ff" stroke-width="6" opacity=".5"/>
  <circle cx="400" cy="250" r="100" fill="none" stroke="#F5C518" stroke-width="5" opacity=".6"/>
  <circle cx="400" cy="250" r="85" fill="url(#portal_inner)" opacity=".9"/>

  <!-- Portal swirl lines -->
  <path d="M310 220 Q350 180 400 210 Q450 240 420 280 Q390 310 350 290 Q310 270 340 240" fill="none" stroke="white" stroke-width="2" opacity=".4"/>
  <path d="M480 220 Q455 178 400 195 Q345 212 355 265 Q365 318 420 310 Q475 302 468 255" fill="none" stroke="white" stroke-width="1.5" opacity=".3"/>

  <!-- Polaroid photos emerging from portal -->
  <!-- Photo 1 (top-left emerging) -->
  <g transform="translate(220,140) rotate(-25)">
    <rect x="0" y="0" width="80" height="96" rx="4" fill="white"/>
    <rect x="6" y="6" width="68" height="64" rx="2" fill="#88ccff"/>
    <!-- Moon scene tiny -->
    <circle cx="40" cy="30" r="18" fill="#fffbe6"/>
    <circle cx="30" cy="22" r="6" fill="#eee" opacity=".4"/>
    <circle cx="52" cy="40" r="4" fill="#eee" opacity=".3"/>
    <!-- Tiny figures -->
    <circle cx="34" cy="46" r="4" fill="#E8B08A"/>
    <circle cx="46" cy="46" r="4" fill="#F5C5A3"/>
    <text x="40" y="82" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#888">🌙 2025</text>
  </g>

  <!-- Photo 2 (top-right emerging) -->
  <g transform="translate(500,130) rotate(20)">
    <rect x="0" y="0" width="80" height="96" rx="4" fill="white"/>
    <rect x="6" y="6" width="68" height="64" rx="2" fill="#ffddcc"/>
    <!-- Mars scene tiny -->
    <rect x="6" y="40" width="68" height="30" rx="0" fill="#b03818"/>
    <circle cx="60" cy="20" r="12" fill="#1e5f8a"/>
    <!-- Tiny spacesuits -->
    <circle cx="30" cy="44" r="5" fill="#e0e0e0"/>
    <circle cx="45" cy="44" r="5" fill="#e0e0e0"/>
    <text x="40" y="82" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#888">🔴 2035</text>
  </g>

  <!-- Photo 3 (bottom-left) -->
  <g transform="translate(200,320) rotate(15)">
    <rect x="0" y="0" width="80" height="96" rx="4" fill="white"/>
    <rect x="6" y="6" width="68" height="64" rx="2" fill="#d4f0d4"/>
    <!-- Jungle scene tiny -->
    <rect x="6" y="35" width="68" height="35" rx="0" fill="#2d7a2d"/>
    <ellipse cx="20" cy="35" rx="12" ry="16" fill="#3a9a3a"/>
    <ellipse cx="55" cy="35" rx="14" ry="18" fill="#3a9a3a"/>
    <!-- Tiny figures -->
    <circle cx="34" cy="42" r="4" fill="#E8B08A"/>
    <circle cx="46" cy="42" r="4" fill="#F5C5A3"/>
    <text x="40" y="82" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#888">🌿 2028</text>
  </g>

  <!-- Photo 4 (bottom-right) -->
  <g transform="translate(500,330) rotate(-18)">
    <rect x="0" y="0" width="80" height="96" rx="4" fill="white"/>
    <rect x="6" y="6" width="68" height="64" rx="2" fill="#fff0aa"/>
    <!-- Egypt scene tiny -->
    <rect x="6" y="30" width="68" height="40" rx="0" fill="#daa830"/>
    <polygon points="25,30 38,10 51,30" fill="#c09020"/>
    <!-- Tiny figures -->
    <circle cx="34" cy="35" r="4" fill="#E8B08A"/>
    <circle cx="46" cy="35" r="4" fill="#F5C5A3"/>
    <text x="40" y="82" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#888">🏛 2030</text>
  </g>

  <!-- Big polaroid camera (left side, Amy holding it) -->
  <g transform="translate(80,220)">
    <!-- Camera body -->
    <rect x="0" y="20" width="90" height="75" rx="10" fill="#1a1a2e"/>
    <rect x="0" y="20" width="90" height="12" rx="6" fill="#2a2a4e"/>
    <!-- Lens -->
    <circle cx="45" cy="62" r="25" fill="#0a0a1a"/>
    <circle cx="45" cy="62" r="18" fill="#1a1a3a"/>
    <circle cx="45" cy="62" r="12" fill="#3a3a6a"/>
    <circle cx="40" cy="57" r="4" fill="white" opacity=".3"/>
    <!-- Flash -->
    <rect x="65" y="25" width="18" height="12" rx="4" fill="#F5C518" opacity=".8"/>
    <!-- Viewfinder -->
    <rect x="5" y="24" width="20" height="14" rx="3" fill="#444"/>
    <!-- Shutter button -->
    <circle cx="75" cy="20" r="7" fill="#F5C518"/>
    <!-- Polaroid coming out -->
    <rect x="20" y="88" width="50" height="60" rx="3" fill="white"/>
    <rect x="25" y="93" width="40" height="38" rx="2" fill="#cceeff"/>
    <!-- Time swirl in polaroid -->
    <circle cx="45" cy="112" r="14" fill="none" stroke="#4488ff" stroke-width="2" opacity=".6"/>
    <circle cx="45" cy="112" r="8" fill="#F5C518" opacity=".5"/>
    <text x="45" y="140" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#888">📸 ???</text>
    <!-- "FOTO UIT DE TOEKOMST" tape label -->
    <rect x="14" y="145" width="62" height="12" rx="2" fill="#F5C518"/>
    <text x="45" y="154" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="bold" fill="#1a1a1a">UIT DE TOEKOMST</text>
  </g>

  <!-- Amy holding the camera -->
  <!-- Amy body -->
  <rect x="96" y="360" width="28" height="50" rx="8" fill="#cc44ff" opacity=".85"/>
  <!-- Arms -->
  <rect x="76" y="355" width="20" height="38" rx="8" fill="#F5C5A3"/>
  <rect x="124" y="370" width="18" height="30" rx="8" fill="#F5C5A3"/>
  <!-- Head -->
  <circle cx="110" cy="345" r="22" fill="#F5C5A3"/>
  <!-- Hair -->
  <ellipse cx="110" cy="333" rx="23" ry="14" fill="#2C1810"/>
  <path d="M88 340 Q85 362 87 380 Q97 376 96 363 Q95 350 96 344 Z" fill="#2C1810"/>
  <path d="M132 340 Q135 362 133 380 Q123 376 124 363 Q125 350 124 344 Z" fill="#2C1810"/>
  <!-- Excited smile -->
  <path d="M103 352 Q110 358 117 352" fill="none" stroke="#8B5E52" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stars and sparkles near camera -->
  <text x="175" y="255" font-family="sans-serif" font-size="16" fill="#F5C518" opacity=".8">✨</text>
  <text x="155" y="285" font-family="sans-serif" font-size="12" fill="#cc44ff" opacity=".7">✨</text>

  <!-- Main title text -->
  <text x="400" y="430" text-anchor="middle" font-family="'Georgia', serif" font-size="26" font-weight="bold" fill="#F5C518" opacity=".95">Let's make some memories...</text>
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aaaaff" opacity=".8">foto's uit de toekomst  📸</text>

  <!-- Floating clock/time elements -->
  <text x="660" y="200" font-family="sans-serif" font-size="30" fill="#F5C518" opacity=".5">⏰</text>
  <text x="720" y="300" font-family="sans-serif" font-size="22" fill="#cc44ff" opacity=".4">🕐</text>
  <text x="40" y="310" font-family="sans-serif" font-size="26" fill="#4488ff" opacity=".4">⌛</text>
</svg>
