<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003a5c"/>
      <stop offset="100%" stop-color="#001a2e"/>
    </linearGradient>
    <radialGradient id="porthole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a8ad4"/>
      <stop offset="100%" stop-color="#0a4a7a"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#deep)"/>

  <!-- Underwater particles/bubbles background -->
  <circle cx="50" cy="100" r="3" fill="#1e8ad4" opacity=".4"/>
  <circle cx="120" cy="200" r="2" fill="#1e8ad4" opacity=".3"/>
  <circle cx="200" cy="80" r="4" fill="#1e8ad4" opacity=".25"/>
  <circle cx="680" cy="150" r="3" fill="#1e8ad4" opacity=".4"/>
  <circle cx="740" cy="80" r="2" fill="#1e8ad4" opacity=".3"/>
  <circle cx="760" cy="220" r="4" fill="#1e8ad4" opacity=".25"/>
  <circle cx="630" cy="50" r="2" fill="#1e8ad4" opacity=".35"/>
  <!-- Fish swimming in background -->
  <path d="M680 200 Q700 196 715 200 Q700 204 680 200 Z" fill="#3aa0d4" opacity=".5"/>
  <circle cx="688" cy="199" r="1.5" fill="white" opacity=".6"/>
  <path d="M100 300 Q118 295 130 300 Q118 305 100 300 Z" fill="#3aa0d4" opacity=".4"/>
  <path d="M720 380 Q738 375 750 380 Q738 385 720 380 Z" fill="#3aa0d4" opacity=".5"/>
  <!-- Seaweed on sides -->
  <path d="M30 500 Q20 460 35 430 Q50 400 40 365 Q55 335 45 300" fill="none" stroke="#1a6e3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M60 500 Q70 455 55 420 Q40 390 58 355 Q72 325 60 290" fill="none" stroke="#1a6e3a" stroke-width="6" stroke-linecap="round"/>
  <path d="M770 500 Q780 460 765 430 Q750 400 760 365 Q745 335 755 300" fill="none" stroke="#1a6e3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M740 500 Q730 455 745 420 Q760 390 742 355 Q728 325 740 290" fill="none" stroke="#1a6e3a" stroke-width="6" stroke-linecap="round"/>

  <!-- SUBMARINE INTERIOR -->
  <!-- Sub hull -->
  <rect x="60" y="120" width="680" height="320" rx="40" fill="#4a5a6a"/>
  <!-- Hull rivets -->
  <circle cx="90" cy="140" r="5" fill="#3a4a5a"/>
  <circle cx="710" cy="140" r="5" fill="#3a4a5a"/>
  <circle cx="90" cy="420" r="5" fill="#3a4a5a"/>
  <circle cx="710" cy="420" r="5" fill="#3a4a5a"/>
  <!-- Interior walls -->
  <rect x="80" y="138" width="640" height="284" rx="30" fill="#3a4555"/>
  <!-- Control panel top -->
  <rect x="80" y="138" width="640" height="60" rx="0" fill="#2a3545"/>
  <!-- Instruments on panel -->
  <circle cx="140" cy="168" r="18" fill="#1a2535"/>
  <circle cx="140" cy="168" r="14" fill="#0a1525"/>
  <line x1="140" y1="168" x2="150" y2="158" stroke="#00ff88" stroke-width="2.5"/>
  <line x1="140" y1="168" x2="132" y2="175" stroke="#ff4444" stroke-width="2"/>
  <circle cx="190" cy="165" r="12" fill="#1a2535"/>
  <line x1="190" y1="165" x2="190" y2="155" stroke="#44aaff" stroke-width="2.5"/>
  <rect x="215" y="150" width="60" height="36" rx="4" fill="#1a2535"/>
  <!-- Screen on panel -->
  <rect x="218" y="153" width="54" height="30" rx="3" fill="#001a0a"/>
  <line x1="222" y1="160" x2="268" y2="160" stroke="#00ff44" stroke-width="1.5" opacity=".7"/>
  <line x1="222" y1="168" x2="258" y2="168" stroke="#00ff44" stroke-width="1.5" opacity=".6"/>
  <line x1="222" y1="175" x2="265" y2="175" stroke="#00ff44" stroke-width="1.5" opacity=".5"/>
  <!-- Buttons and dials -->
  <circle cx="300" cy="162" r="8" fill="#cc2222"/>
  <circle cx="322" cy="162" r="8" fill="#00aa44"/>
  <circle cx="344" cy="162" r="8" fill="#F5C518"/>
  <circle cx="300" cy="162" r="4" fill="#ff4444"/>
  <circle cx="322" cy="162" r="4" fill="#00ff66"/>
  <circle cx="344" cy="162" r="4" fill="#ffdd44"/>
  <!-- More instruments right side -->
  <circle cx="620" cy="165" r="16" fill="#1a2535"/>
  <circle cx="620" cy="165" r="12" fill="#0a1525"/>
  <line x1="620" y1="165" x2="628" y2="155" stroke="#ffaa00" stroke-width="2.5"/>
  <circle cx="665" cy="162" r="12" fill="#1a2535"/>
  <line x1="665" y1="162" x2="665" y2="152" stroke="#44aaff" stroke-width="2.5"/>

  <!-- Periscope -->
  <rect x="390" y="80" width="20" height="70" rx="5" fill="#2a3545"/>
  <rect x="378" y="78" width="44" height="15" rx="4" fill="#2a3545"/>

  <!-- STEERING WHEEL in center -->
  <circle cx="400" cy="340" r="55" fill="none" stroke="#8B5E2A" stroke-width="8"/>
  <circle cx="400" cy="340" r="12" fill="#8B5E2A"/>
  <!-- Spokes -->
  <line x1="400" y1="285" x2="400" y2="355" stroke="#8B5E2A" stroke-width="5"/>
  <line x1="345" y1="340" x2="415" y2="340" stroke="#8B5E2A" stroke-width="5"/>
  <line x1="361" y1="301" x2="415" y2="355" stroke="#8B5E2A" stroke-width="4"/>
  <line x1="439" y1="301" x2="385" y2="355" stroke="#8B5E2A" stroke-width="4"/>

  <!-- OCTOPUS wrapping around wheel -->
  <!-- Octopus head/body (behind wheel, upper right area going off to porthole) -->
  <ellipse cx="600" cy="300" rx="55" ry="45" fill="#8B0fa0" opacity=".9"/>
  <!-- Octopus eyes -->
  <circle cx="582" cy="285" r="10" fill="white"/>
  <circle cx="606" cy="280" r="10" fill="white"/>
  <circle cx="586" cy="285" r="6" fill="#1a0a1a"/>
  <circle cx="610" cy="280" r="6" fill="#1a0a1a"/>
  <circle cx="588" cy="283" r="2" fill="white"/>
  <circle cx="612" cy="278" r="2" fill="white"/>
  <!-- Tentacles -->
  <!-- Tentacle gripping the wheel -->
  <path d="M560 315 Q510 330 460 342 Q440 344 420 342" fill="none" stroke="#8B0fa0" stroke-width="14" stroke-linecap="round"/>
  <!-- Suckers on tentacle -->
  <circle cx="540" cy="320" r="4" fill="#a030b0" opacity=".8"/>
  <circle cx="518" cy="328" r="4" fill="#a030b0" opacity=".8"/>
  <circle cx="497" cy="336" r="4" fill="#a030b0" opacity=".8"/>
  <circle cx="475" cy="340" r="4" fill="#a030b0" opacity=".8"/>
  <circle cx="452" cy="341" r="4" fill="#a030b0" opacity=".8"/>
  <!-- Second tentacle also on wheel -->
  <path d="M558 332 Q510 355 468 358 Q450 358 435 355" fill="none" stroke="#8B0fa0" stroke-width="12" stroke-linecap="round"/>
  <!-- Tentacle going up -->
  <path d="M615 258 Q630 220 620 185 Q638 182 645 205 Q640 240 628 265" fill="none" stroke="#9a20b0" stroke-width="10" stroke-linecap="round"/>
  <!-- Tentacle going down -->
  <path d="M648 330 Q680 380 670 430 Q685 435 695 415 Q700 375 675 338" fill="none" stroke="#9a20b0" stroke-width="10" stroke-linecap="round"/>
  <!-- Tentacle going right (into porthole area) -->
  <path d="M645 300 Q700 295 740 300" fill="none" stroke="#8B0fa0" stroke-width="12" stroke-linecap="round"/>

  <!-- PORTHOLE (right side, showing octopus face coming through) -->
  <circle cx="700" cy="300" r="65" fill="#2255a8"/>
  <circle cx="700" cy="300" r="58" fill="url(#porthole)"/>
  <!-- Water outside -->
  <circle cx="700" cy="300" r="65" fill="none" stroke="#5a7a9a" stroke-width="8"/>
  <circle cx="700" cy="300" r="65" fill="none" stroke="#8aaa cc" stroke-width="3" opacity=".4"/>
  <!-- Cross bolts -->
  <rect x="694" y="232" width="12" height="136" rx="5" fill="#4a5a6a"/>
  <rect x="632" y="294" width="136" height="12" rx="5" fill="#4a5a6a"/>
  <!-- Tentacle sucker dots outside -->
  <circle cx="678" cy="268" r="3" fill="#a030b0" opacity=".5"/>
  <circle cx="720" cy="260" r="3" fill="#a030b0" opacity=".5"/>

  <!-- AMY (left, panicking) -->
  <!-- Body -->
  <rect x="155" y="248" width="52" height="85" rx="12" fill="#3a5fa8"/>
  <!-- Arms flailing -->
  <path d="M155 258 Q132 244 120 226 Q132 218 140 232 Q150 246 158 254 Z" fill="#3a5fa8"/>
  <path d="M207 258 Q230 244 242 226 Q230 218 222 232 Q212 246 208 254 Z" fill="#3a5fa8"/>
  <!-- Hands up -->
  <ellipse cx="126" cy="220" rx="13" ry="10" fill="#F5C5A3" transform="rotate(-25 126 220)"/>
  <ellipse cx="238" cy="220" rx="13" ry="10" fill="#F5C5A3" transform="rotate(25 238 220)"/>
  <!-- Legs -->
  <rect x="162" y="328" width="20" height="72" rx="9" fill="#2a4580"/>
  <rect x="186" y="328" width="20" height="72" rx="9" fill="#2a4580"/>
  <!-- Head -->
  <circle cx="181" cy="230" r="28" fill="#F5C5A3"/>
  <!-- Dark hair -->
  <ellipse cx="181" cy="216" rx="29" ry="18" fill="#2C1810"/>
  <path d="M154 222 Q146 238 148 262 Q158 258 157 244 Q156 230 156 225 Z" fill="#2C1810"/>
  <path d="M208 222 Q216 238 214 262 Q204 258 205 244 Q206 230 206 225 Z" fill="#2C1810"/>
  <!-- Eyes (wide/panicked) -->
  <circle cx="172" cy="228" r="7" fill="white"/>
  <circle cx="190" cy="228" r="7" fill="white"/>
  <circle cx="173" cy="229" r="4" fill="#1a1a1a"/>
  <circle cx="191" cy="229" r="4" fill="#1a1a1a"/>
  <circle cx="174" cy="227" r="1.5" fill="white"/>
  <circle cx="192" cy="227" r="1.5" fill="white"/>
  <!-- Open mouth (panic) -->
  <path d="M170 242 Q181 252 192 242 Q181 256 170 242 Z" fill="#8B4040"/>
  <rect x="172" y="243" width="18" height="8" rx="2" fill="#8B4040"/>
  <!-- Sweat drops -->
  <circle cx="153" cy="225" r="3" fill="#7dd4f8"/>
  <circle cx="148" cy="238" r="2" fill="#7dd4f8"/>

  <!-- TIM (center-left, also panicking, pointing at octopus) -->
  <!-- Body -->
  <rect x="258" y="255" width="54" height="82" rx="12" fill="#c04060"/>
  <!-- Arm pointing -->
  <rect x="258" y="265" width="26" height="15" rx="7" fill="#c04060" transform="rotate(-15 258 272)"/>
  <ellipse cx="246" cy="260" rx="12" ry="9" fill="#E8B08A" transform="rotate(-15 246 260)"/>
  <!-- Other arm flailing -->
  <path d="M312 265 Q335 252 345 238 Q333 230 325 242 Q315 256 312 263 Z" fill="#c04060"/>
  <ellipse cx="350" cy="234" rx="12" ry="9" fill="#E8B08A" transform="rotate(20 350 234)"/>
  <!-- Legs -->
  <rect x="264" y="333" width="20" height="70" rx="9" fill="#a03050"/>
  <rect x="288" y="333" width="20" height="70" rx="9" fill="#a03050"/>
  <!-- Head -->
  <circle cx="285" cy="238" r="30" fill="#E8B08A"/>
  <!-- Hair -->
  <path d="M258 229 Q260 207 285 204 Q310 207 312 229" fill="#C4965A"/>
  <rect x="256" y="214" width="58" height="16" rx="8" fill="#C4965A"/>
  <!-- Eyes (panicking) -->
  <circle cx="273" cy="235" r="7" fill="white"/>
  <circle cx="297" cy="235" r="7" fill="white"/>
  <circle cx="274" cy="236" r="4.5" fill="#1a1a1a"/>
  <circle cx="298" cy="236" r="4.5" fill="#1a1a1a"/>
  <circle cx="275" cy="234" r="1.5" fill="white"/>
  <circle cx="299" cy="234" r="1.5" fill="white"/>
  <!-- Yelling mouth -->
  <ellipse cx="285" cy="252" rx="10" ry="7" fill="#8B4040"/>
  <!-- Sweat drops -->
  <circle cx="318" cy="225" r="3" fill="#7dd4f8"/>
  <circle cx="325" cy="238" r="2" fill="#7dd4f8"/>

  <!-- Bubbles going up (from sub) -->
  <circle cx="200" cy="140" r="5" fill="none" stroke="#5ab0d8" stroke-width="1.5" opacity=".5"/>
  <circle cx="215" cy="125" r="4" fill="none" stroke="#5ab0d8" stroke-width="1.5" opacity=".4"/>
  <circle cx="205" cy="110" r="3" fill="none" stroke="#5ab0d8" stroke-width="1.5" opacity=".3"/>

  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#88d4f8" opacity=".9">Diepzee-expeditie – de octopus pakte het stuur 🐙</text>
</svg>
