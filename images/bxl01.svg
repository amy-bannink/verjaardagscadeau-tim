<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="65%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="300" height="400" fill="url(#sky1)"/>

  <!-- Clouds -->
  <ellipse cx="55" cy="58" rx="44" ry="20" fill="white" opacity=".82"/>
  <ellipse cx="35" cy="52" rx="28" ry="16" fill="white" opacity=".82"/>
  <ellipse cx="235" cy="72" rx="40" ry="18" fill="white" opacity=".75"/>
  <ellipse cx="262" cy="65" rx="26" ry="14" fill="white" opacity=".75"/>

  <!-- Speed lines (motion blur at top left) -->
  <line x1="0" y1="148" x2="50" y2="151" stroke="white" stroke-width="2.5" opacity=".45"/>
  <line x1="0" y1="160" x2="55" y2="163" stroke="white" stroke-width="2" opacity=".38"/>
  <line x1="0" y1="172" x2="48" y2="174" stroke="white" stroke-width="1.5" opacity=".35"/>

  <!-- Track support beams (behind car) -->
  <line x1="42" y1="200" x2="42" y2="400" stroke="#546e7a" stroke-width="5" opacity=".45"/>
  <line x1="130" y1="202" x2="130" y2="400" stroke="#546e7a" stroke-width="5" opacity=".45"/>
  <line x1="218" y1="218" x2="218" y2="400" stroke="#546e7a" stroke-width="5" opacity=".42"/>
  <line x1="38" y1="295" x2="222" y2="295" stroke="#546e7a" stroke-width="3.5" opacity=".38"/>
  <line x1="42" y1="345" x2="222" y2="355" stroke="#546e7a" stroke-width="3" opacity=".35"/>

  <!-- Rollercoaster rails (steep drop, top-left to bottom-right) -->
  <path d="M0 192 Q55 186 115 196 Q175 212 235 268 Q265 298 300 348" fill="none" stroke="#78909c" stroke-width="8"/>
  <path d="M0 205 Q55 199 115 209 Q175 225 235 281 Q265 311 300 361" fill="none" stroke="#78909c" stroke-width="8"/>
  <!-- Tie bars -->
  <line x1="28" y1="194" x2="29" y2="207" stroke="#607d8b" stroke-width="4.5"/>
  <line x1="62" y1="191" x2="63" y2="204" stroke="#607d8b" stroke-width="4.5"/>
  <line x1="97" y1="193" x2="98" y2="206" stroke="#607d8b" stroke-width="4.5"/>
  <line x1="135" y1="199" x2="137" y2="213" stroke="#607d8b" stroke-width="4.5"/>
  <line x1="172" y1="211" x2="174" y2="225" stroke="#607d8b" stroke-width="4.5"/>

  <!-- Rollercoaster car (on the track, top section) -->
  <rect x="62" y="153" width="172" height="58" rx="14" fill="#e53935"/>
  <!-- Front nose -->
  <path d="M62 161 Q44 171 44 184 Q44 200 62 205 L62 161 Z" fill="#c62828"/>
  <!-- Rear bumper -->
  <rect x="232" y="161" width="18" height="40" rx="6" fill="#b71c1c"/>
  <!-- Stripe detail -->
  <rect x="62" y="172" width="172" height="9" fill="#ff5252" opacity=".45"/>
  <!-- WALIBI text -->
  <text x="148" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white" letter-spacing="1.5" opacity=".95">WALIBI</text>
  <!-- Seat divider -->
  <rect x="147" y="155" width="5" height="56" rx="2" fill="#b71c1c" opacity=".65"/>
  <!-- Lap bars -->
  <path d="M74 192 Q109 205 143 194" fill="none" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
  <path d="M154 194 Q189 205 222 192" fill="none" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>

  <!-- TIM (left seat) — screaming, arms up -->
  <!-- Shirt visible above lap bar -->
  <rect x="74" y="157" width="66" height="36" rx="6" fill="#1565c0"/>
  <!-- Head -->
  <circle cx="107" cy="130" r="26" fill="#E8B08A"/>
  <!-- Blond hair -->
  <path d="M82 122 Q85 100 107 97 Q129 100 132 122" fill="#C4965A"/>
  <rect x="81" y="108" width="52" height="17" rx="8" fill="#C4965A"/>
  <!-- Wide shock eyes -->
  <circle cx="97" cy="124" r="7" fill="white"/>
  <circle cx="117" cy="124" r="7" fill="white"/>
  <circle cx="98" cy="124" r="4" fill="#1a1a1a"/>
  <circle cx="118" cy="124" r="4" fill="#1a1a1a"/>
  <circle cx="99" cy="123" r="1.5" fill="white"/>
  <circle cx="119" cy="123" r="1.5" fill="white"/>
  <!-- Screaming open mouth -->
  <ellipse cx="107" cy="143" rx="12" ry="9" fill="#8B2020"/>
  <rect x="96" y="141" width="22" height="7" fill="#8B2020"/>
  <line x1="100" y1="137" x2="100" y2="143" stroke="white" stroke-width="2.5"/>
  <line x1="107" y1="136" x2="107" y2="142" stroke="white" stroke-width="2.5"/>
  <line x1="114" y1="137" x2="114" y2="143" stroke="white" stroke-width="2.5"/>
  <!-- Arms UP! -->
  <path d="M82 167 L60 124" stroke="#E8B08A" stroke-width="14" stroke-linecap="round"/>
  <circle cx="57" cy="119" r="11" fill="#E8B08A"/>
  <path d="M130 167 L152 124" stroke="#E8B08A" stroke-width="14" stroke-linecap="round"/>
  <circle cx="155" cy="119" r="11" fill="#E8B08A"/>

  <!-- AMY (right seat) — laughing, arms up -->
  <!-- Shirt -->
  <rect x="157" y="157" width="66" height="36" rx="6" fill="#e91e8c"/>
  <!-- Head -->
  <circle cx="190" cy="130" r="26" fill="#F5C5A3"/>
  <!-- Dark hair -->
  <ellipse cx="190" cy="113" rx="26" ry="18" fill="#2C1810"/>
  <path d="M165 123 Q158 136 160 157 Q169 153 168 142 Q167 132 168 126 Z" fill="#2C1810"/>
  <path d="M215 123 Q222 136 220 157 Q211 153 212 142 Q213 132 212 126 Z" fill="#2C1810"/>
  <!-- Big laughing smile -->
  <path d="M178 144 Q190 156 202 144" fill="#cc3366"/>
  <path d="M179 144 Q190 150 201 144" fill="white"/>
  <!-- Excited eyes (slightly squinting from smile) -->
  <path d="M178 126 Q190 122 202 126" fill="none" stroke="#555" stroke-width="2.5"/>
  <circle cx="182" cy="123" r="5.5" fill="white"/>
  <circle cx="198" cy="123" r="5.5" fill="white"/>
  <circle cx="183" cy="123" r="3.5" fill="#1a1a1a"/>
  <circle cx="199" cy="123" r="3.5" fill="#1a1a1a"/>
  <!-- Rosy cheeks -->
  <ellipse cx="175" cy="138" rx="8" ry="5" fill="#ffaaaa" opacity=".4"/>
  <ellipse cx="205" cy="138" rx="8" ry="5" fill="#ffaaaa" opacity=".4"/>
  <!-- Arms UP! -->
  <path d="M162 167 L140 124" stroke="#F5C5A3" stroke-width="14" stroke-linecap="round"/>
  <circle cx="137" cy="119" r="11" fill="#F5C5A3"/>
  <path d="M214 167 L236 124" stroke="#F5C5A3" stroke-width="14" stroke-linecap="round"/>
  <circle cx="239" cy="119" r="11" fill="#F5C5A3"/>

  <!-- Speech bubble: TIM -->
  <rect x="5" y="42" width="88" height="40" rx="8" fill="white" opacity=".93"/>
  <path d="M62,82 L57,94 L74,84 Z" fill="white" opacity=".93"/>
  <text x="49" y="59" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e53935">AAAAH!!</text>
  <text x="49" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">nee nee nee! 😱</text>

  <!-- Speech bubble: AMY -->
  <rect x="200" y="40" width="94" height="40" rx="8" fill="white" opacity=".93"/>
  <path d="M222,80 L217,94 L234,82 Z" fill="white" opacity=".93"/>
  <text x="247" y="57" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e91e8c">HAHAHA! 😂</text>
  <text x="247" y="73" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">nog een keer!!</text>

  <!-- Caption bar -->
  <rect x="0" y="370" width="300" height="30" fill="rgba(0,0,0,0.45)"/>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Walibi – april 2026 🎢</text>
</svg>
