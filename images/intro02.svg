  <circle cx="610" cy="308" r="14" fill="#f8f0e0"/>
  <circle cx="680" cy="308" r="20" fill="white" stroke="#ddd" stroke-width="2"/>
  <circle cx="680" cy="308" r="14" fill="#f8f0e0"/>
  <!-- Food on plates (fancy) -->
  <circle cx="610" cy="308" r="7" fill="#c87830"/>
  <circle cx="680" cy="308" r="7" fill="#5a8a3a"/>
  <!-- Wine glasses -->
  <path d="M598 294 Q600 280 598 270 L606 270 Q604 280 606 294 Z" fill="none" stroke="#ddd" stroke-width="2"/>
  <ellipse cx="602" cy="269" rx="8" ry="4" fill="#ff9999" opacity=".7"/>
  <path d="M668 294 Q670 280 668 270 L676 270 Q674 280 676 294 Z" fill="none" stroke="#ddd" stroke-width="2"/>
  <ellipse cx="672" cy="269" rx="8" ry="4" fill="#ff9999" opacity=".7"/>
  <!-- Candles on table -->
  <rect x="637" y="285" width="6" height="20" rx="2" fill="#fff8e0" stroke="#ddd" stroke-width="1"/>
  <path d="M638 284 Q640 278 642 284 Q641 287 638 284 Z" fill="#ff8800"/>
  <rect x="650" y="285" width="6" height="20" rx="2" fill="#fff8e0" stroke="#ddd" stroke-width="1"/>
  <path d="M651 284 Q653 278 655 284 Q654 287 651 284 Z" fill="#ff8800"/>
  <!-- Table legs -->
  <rect x="575" y="338" width="12" height="20" rx="3" fill="#7a4000"/>
  <rect x="703" y="338" width="12" height="20" rx="3" fill="#7a4000"/>

  <!-- Amy at table (left seat) -->
  <circle cx="588" cy="278" r="16" fill="#F5C5A3"/>
  <ellipse cx="588" cy="268" rx="17" ry="11" fill="#2C1810"/>
  <path d="M572 272 Q569 290 572 305 Q580 302 580 292 Q580 282 580 274 Z" fill="#2C1810"/>
  <path d="M604 272 Q607 290 604 305 Q596 302 596 292 Q596 282 596 274 Z" fill="#2C1810"/>
  <!-- Amy smiling -->
  <path d="M583 284 Q588 288 593 284" fill="none" stroke="#8B5E52" stroke-width="2" stroke-linecap="round"/>
  <!-- Amy dress/body -->
  <path d="M574 294 Q576 330 575 340 L601 340 Q600 330 602 294 Q595 300 588 298 Q581 300 574 294Z" fill="#cc44ff" opacity=".8"/>

  <!-- Tim at table (right seat) -->
  <circle cx="702" cy="278" r="16" fill="#E8B08A"/>
  <path d="M688 272 Q690 262 702 260 Q714 262 716 272" fill="#C4965A"/>
  <rect x="686" y="264" width="32" height="10" rx="5" fill="#C4965A"/>
  <!-- Tim smiling -->
  <path d="M697 284 Q702 289 707 284" fill="none" stroke="#8B5E52" stroke-width="2" stroke-linecap="round"/>
  <!-- Tim shirt/body -->
  <path d="M688 294 Q690 330 689 340 L715 340 Q714 330 716 294 Q709 300 702 298 Q695 300 688 294Z" fill="#4488ff" opacity=".8"/>

  <!-- Speech bubble - Tim -->
  <rect x="718" y="248" width="68" height="26" rx="6" fill="white" opacity=".9"/>
  <circle cx="722" cy="274" r="4" fill="white" opacity=".9"/>
  <text x="752" y="264" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Proost! 🥂</text>

  <!-- Belgian flag / Brussels flag small -->
  <rect x="500" y="200" width="12" height="24" fill="#1a1a1a"/>
  <rect x="512" y="200" width="12" height="24" fill="#F5C518"/>
  <rect x="524" y="200" width="12" height="24" fill="#cc0000"/>
  <line x1="506" y1="200" x2="506" y2="180" stroke="#888" stroke-width="2"/>
  <!-- Brussels label -->
  <text x="518" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Brussel 🍫</text>

  <!-- Bottom label -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a1a" opacity=".7">Het plan: Walibi 🎢 • Airbnb 🏠 • Verjaardagsdiner 🍽</text>
</svg>
