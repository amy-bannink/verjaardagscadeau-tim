  <line x1="80" y1="200" x2="80" y2="340" stroke="#8B4513" stroke-width="5"/>
  <line x1="160" y1="200" x2="160" y2="340" stroke="#8B4513" stroke-width="5"/>
  <line x1="240" y1="200" x2="240" y2="340" stroke="#8B4513" stroke-width="5"/>
  <line x1="310" y1="200" x2="310" y2="340" stroke="#8B4513" stroke-width="5"/>
  <line x1="120" y1="200" x2="100" y2="340" stroke="#8B4513" stroke-width="3" opacity=".6"/>
  <line x1="200" y1="200" x2="200" y2="340" stroke="#8B4513" stroke-width="3" opacity=".6"/>
  <line x1="280" y1="200" x2="290" y2="340" stroke="#8B4513" stroke-width="3" opacity=".6"/>
  <!-- Coaster car on track (top of first hill) -->
  <rect x="72" y="186" width="52" height="22" rx="6" fill="#F5C518"/>
  <rect x="72" y="186" width="52" height="10" rx="4" fill="#c9a000"/>
