  <line x1="104" y1="186" x2="94" y2="172" stroke="#F5C5A3" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="186" x2="130" y2="172" stroke="#F5C5A3" stroke-width="4" stroke-linecap="round"/>
  <!-- Speed lines -->
