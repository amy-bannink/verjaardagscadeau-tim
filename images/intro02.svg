  <circle cx="350" cy="358" r="6" fill="#ff4466"/>
  <circle cx="350" cy="358" r="3" fill="#F5C518"/>
  <circle cx="460" cy="358" r="6" fill="#cc44ff"/>
  <circle cx="460" cy="358" r="3" fill="#F5C518"/>
  <circle cx="340" cy="352" r="5" fill="#44cc66"/>
  <circle cx="470" cy="352" r="5" fill="#44aaff"/>
