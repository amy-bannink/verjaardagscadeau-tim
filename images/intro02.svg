  <!-- Tim head -->
  <circle cx="88" cy="182" r="10" fill="#E8B08A"/>
  <path d="M80 177 Q88 170 96 177" fill="#C4965A"/>
  <!-- Screaming mouth -->
  <path d="M83 186 Q88 191 93 186" fill="#cc3300" stroke="#cc3300" stroke-width="1"/>
  <!-- Arms up -->
  <line x1="80" y1="186" x2="70" y2="172" stroke="#E8B08A" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="186" x2="106" y2="172" stroke="#E8B08A" stroke-width="4" stroke-linecap="round"/>
  <!-- Amy head -->
  <circle cx="112" cy="182" r="10" fill="#F5C5A3"/>
  <path d="M102 177 Q112 168 122 177 L122 195 Q112 190 102 195 Z" fill="#2C1810"/>
  <!-- Amy laughing -->
  <path d="M106 186 Q112 192 118 186" fill="#cc3300" stroke="#cc3300" stroke-width="1"/>
