  <rect x="355" y="238" width="100" height="20" rx="4" fill="white" opacity=".85"/>
  <text x="405" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ff5a5f">Onze Airbnb ★</text>

  <!-- === DINNER TABLE (right side) === -->
  <!-- Table -->
  <ellipse cx="645" cy="340" rx="100" ry="30" fill="#8B5010"/>
  <rect x="545" y="315" width="200" height="28" rx="5" fill="#a0620a"/>
  <!-- Table cloth -->
