<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#c8e8f8"/>
    </linearGradient>
    <linearGradient id="grass02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#3a8a3a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky02)"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="url(#grass02)"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="80" rx="55" ry="30" fill="white" opacity=".85"/>
  <ellipse cx="160" cy="68" rx="40" ry="28" fill="white" opacity=".85"/>
  <ellipse cx="80" cy="72" rx="38" ry="22" fill="white" opacity=".85"/>
  <ellipse cx="620" cy="65" rx="50" ry="26" fill="white" opacity=".8"/>
  <ellipse cx="660" cy="55" rx="35" ry="24" fill="white" opacity=".8"/>
  <ellipse cx="580" cy="60" rx="32" ry="20" fill="white" opacity=".8"/>

  <!-- === WALIBI ROLLERCOASTER (left side) === -->
  <!-- Track structure -->
  <path d="M30 330 L80 200 L160 200 L200 260 L240 200 L310 200 L340 330" fill="none" stroke="#8B4513" stroke-width="8"/>
  <path d="M30 338 L80 208 L160 208 L200 268 L240 208 L310 208 L340 338" fill="none" stroke="#8B4513" stroke-width="4" opacity=".5"/>
