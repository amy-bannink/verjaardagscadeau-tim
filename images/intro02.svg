  <line x1="370" y1="280" x2="370" y2="310" stroke="#88b8d0" stroke-width="1.5"/>
  <line x1="353" y1="295" x2="388" y2="295" stroke="#88b8d0" stroke-width="1.5"/>
  <rect x="422" y="280" width="35" height="30" rx="4" fill="#b8e4f8"/>
  <line x1="439" y1="280" x2="439" y2="310" stroke="#88b8d0" stroke-width="1.5"/>
  <line x1="422" y1="295" x2="457" y2="295" stroke="#88b8d0" stroke-width="1.5"/>
