<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>QR Code – Verjaardagscadeau Tim</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Georgia&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f7f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 52px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      max-width: 400px;
      width: 100%;
    }

    .confetti-row {
      font-size: 1.4rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    h1 span {
      background: #FFF8D6;
      color: #C9A000;
      padding: 1px 8px;
      border-radius: 6px;
    }

    .subtitle {
      color: #6b6b6b;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 12px;
      border: 6px solid #F5C518;
      padding: 10px;
      background: white;
    }

    .url {
      font-size: 0.72rem;
      color: #888;
      word-break: break-all;
      margin-bottom: 24px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e5;
      margin-bottom: 20px;
    }

    .footer-text {
      font-size: 0.85rem;
      color: #aaa;
    }

    .footer-text strong {
      color: #C9A000;
    }

    @media print {
      body { background: white; }
      .card { box-shadow: none; border: 2px solid #F5C518; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="confetti-row">🎉🎈🎂🎈🎉</div>
    <h1>Gefeliciteerd, <span>Tim</span>!</h1>
    <p class="subtitle">Scan de QR-code voor je verjaardagscadeau</p>

    <div id="qrcode"></div>

    <p class="url">https://amy-bannink.github.io/verjaardagscadeau-tim/</p>

    <hr class="divider" />
    <p class="footer-text">Met veel <strong>♥</strong> van Amy</p>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://amy-bannink.github.io/verjaardagscadeau-tim/",
      width: 220,
      height: 220,
      colorDark: "#1A1A1A",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
